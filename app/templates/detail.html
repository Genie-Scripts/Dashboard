<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>統合詳細ダッシュボード</title>

<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
:root{--bg:#f6f8fb;--s:#fff;--ink:#1a2332;--sub:#5f7084;--mu:#9daab8;--ln:#dfe5ed;--br:#0e4da4;--bl:#e8f0fe;--bd:#0a3671;--dr:#c4314b;--dr-bg:#fdf0f2;--dr-t:#8c1d35;--wr:#b45309;--wr-bg:#fef7ee;--ok:#0e7a54;--ok-bg:#ecfdf5;--inf:#2563eb;--r:18px;--sh:0 4px 14px rgba(10,22,42,.08)}
[data-theme="dark"]{--bg:#0f1623;--s:#1a2738;--ink:#dde4ef;--sub:#8fa3b8;--mu:#4a5f74;--ln:#2a3a50;--br:#5b9cf6;--bl:#162340;--bd:#060d18;--dr:#f07090;--dr-bg:#2d1020;--dr-t:#f5a0b0;--wr:#f0a040;--wr-bg:#2a1a06;--ok:#34d39a;--ok-bg:#0a2518;--inf:#5b9cf6;--sh:0 4px 14px rgba(0,0,0,.4)}
[data-theme="dark"] .ri,[data-theme="dark"] .at{background:#111e2e}
[data-theme="dark"] .kc .tgt-row,[data-theme="dark"] .tgt-row,[data-theme="dark"] .mc{background:#111e2e}
[data-theme="dark"] .bx{background:#111e2e}
.dm-btn{background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:8px;color:#a8bdd4;font-size:14px;padding:4px 9px;cursor:pointer;transition:all .15s;font-family:inherit;line-height:1}.dm-btn:hover{color:#fff;border-color:rgba(255,255,255,.5)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.hdr{position:sticky;top:0;z-index:10;background:var(--bd);color:#fff;padding:10px 24px;box-shadow:var(--sh)}.hdr .row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}.left{display:flex;align-items:center;gap:10px}.back{color:#a8bdd4;text-decoration:none;font-size:13px;font-weight:800}.badge{font-size:11px;background:var(--br);padding:3px 10px;border-radius:999px;font-weight:800}.title{font-size:17px;font-weight:900}.right{display:flex;align-items:center;gap:10px}.role{display:flex;gap:4px}.role a{font-size:12px;font-weight:800;text-decoration:none;padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.25);color:#a8bdd4;transition:all .15s}.role a.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4)}.meta{font-size:12px;color:#a8bdd4}.act{color:#a8bdd4;text-decoration:none;font-size:12px}
.nav-bar{display:flex;align-items:center;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.12)}.nav-bar a{font-size:12px;font-weight:800;text-decoration:none;padding:5px 13px;border-radius:8px;color:#a8bdd4;transition:all .15s;border:1px solid transparent}.nav-bar a:hover{color:#fff;border-color:rgba(255,255,255,.25)}.nav-bar a.active{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.35)}
.w{max-width:1280px;margin:0 auto;padding:16px 20px 48px}
/* ★課題4: タブを大きく、数字を目立たせる */
.tabs{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));background:var(--s);border:1px solid var(--ln);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}.tab{padding:16px 18px;border-right:1px solid var(--ln);cursor:pointer;transition:background .15s}.tab:last-child{border-right:none}.tab:hover{background:#f8fafc}.tab:not(.active){background:#f0f4f8;color:var(--sub)}.tab.active{background:var(--s);color:var(--ink);box-shadow:inset 0 -4px 0 var(--br),0 4px 12px rgba(14,77,164,.10)}.tab .nm{font-size:13px;font-weight:800}.tab .big{font-size:28px;font-weight:900;line-height:1.1;margin:4px 0}.tab:not(.active) .big{color:var(--sub)}.tab .per{font-size:11px;color:var(--sub);margin-top:2px}.tab .st{display:inline-block;font-size:10px;font-weight:900;padding:2px 8px;border-radius:999px;margin-left:4px;background:var(--dr-bg);color:var(--dr-t)}
.sum{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:10px;margin-top:12px}.bx{background:var(--bg);border:1px solid var(--ln);border-radius:14px;padding:12px 14px;box-shadow:0 2px 6px rgba(10,22,42,.04)}.bx h2{font-size:16px;margin:0}.bx .k{font-size:13px;color:var(--sub);font-weight:700}.bx .v{font-size:24px;font-weight:900;margin-top:4px}.bx .v.dr{color:var(--dr)}
.bx .cmp-bar{height:4px;background:#edf2f7;border-radius:999px;overflow:hidden;margin-top:8px}.bx .cmp-fill{height:100%;border-radius:999px;transition:width .3s}.bx .cmp-fill.ok{background:var(--ok)}.bx .cmp-fill.wr{background:var(--wr)}.bx .cmp-fill.dr{background:var(--dr)}.bx .cmp-fill.mu{background:var(--mu)}.bx .cmp-meta{display:flex;justify-content:space-between;align-items:center;margin-top:3px}.bx .cmp-prev{font-size:13px;color:var(--sub);font-weight:600}.bx .cmp-dir{font-size:11px;font-weight:900;padding:2px 6px;border-radius:4px}.bx .cmp-dir.ok{background:var(--ok-bg);color:#065f42}.bx .cmp-dir.wr{background:var(--wr-bg);color:#7c3a06}.bx .cmp-dir.dr{background:var(--dr-bg);color:var(--dr-t)}.bx .cmp-dir.mu{color:var(--mu)}
/* ★Plan-B: 実績+目標+差分 統合カード */
.bx-main{background:var(--s);border:1px solid var(--ln);border-radius:14px;padding:14px 16px;box-shadow:0 2px 6px rgba(10,22,42,.04)}.bx-main.ok{background:var(--ok-bg)}.bx-main.wr{background:var(--wr-bg)}.bx-main.dr{background:var(--dr-bg)}.bx-main h2{font-size:14px;margin:0 0 6px;font-weight:800}.bx-main .period-note{font-size:11px;color:var(--sub);margin-bottom:4px}.bx-main .main-val{font-size:28px;font-weight:900;line-height:1.15}.bx-main .main-val.dr{color:var(--dr)}.bx-main .main-unit{font-size:14px;font-weight:400;color:var(--sub)}
.tgt-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 10px;background:#f8f9fa;border-radius:10px;border:1px dashed var(--ln)}.tgt-icon{font-size:12px}.tgt-label{font-size:12px;color:var(--mu);font-weight:700}.tgt-val{font-size:14px;font-weight:800;color:var(--sub)}.gap-val{font-size:14px;font-weight:900;margin-left:auto}.gap-val.dr{color:var(--dr)}.gap-val.wr{color:var(--wr)}.gap-val.ok{color:var(--ok)}
.prog-wrap{margin-top:6px}.prog-bar{height:6px;background:#edf2f7;border-radius:999px;overflow:hidden}.prog-fill{height:100%;border-radius:999px;transition:width .3s}.prog-fill.ok{background:var(--ok)}.prog-fill.wr{background:var(--wr)}.prog-fill.dr{background:var(--dr)}.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-top:3px}.prog-pct{font-size:11px;font-weight:800}.prog-pct.dr{color:var(--dr)}.prog-pct.wr{color:var(--wr)}.prog-pct.ok{color:var(--ok)}.prog-status{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px}.prog-status.dr{background:var(--dr-bg);color:var(--dr-t)}.prog-status.wr{background:var(--wr-bg);color:#7c3a06}.prog-status.ok{background:var(--ok-bg);color:#065f42}
.tb{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}.grp{display:flex;align-items:center;gap:5px}.gl{font-size:12px;font-weight:800;color:var(--sub)}.btn{background:var(--s);border:1px solid var(--ln);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;color:var(--sub);cursor:pointer;box-shadow:0 1px 3px rgba(10,22,42,.04);transition:all .15s}.btn:hover{border-color:#93b4e4;color:var(--br)}.btn.active{background:var(--bl);border-color:#93b4e4;color:var(--br)}
.main{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-top:12px;align-items:start}.pnl-chart{}.pnl{background:var(--s);border:1px solid var(--ln);border-radius:var(--r);padding:18px;box-shadow:var(--sh);overflow:hidden}.pnl h3{margin:0 0 12px;font-size:14px;font-weight:800}
.chart{width:100%;height:340px;overflow:hidden}
.rk{display:grid;gap:6px}.ri{display:grid;grid-template-columns:26px 1fr 120px 55px 60px 16px;gap:6px;align-items:center;padding:10px;border:1px solid var(--ln);border-radius:12px;background:#fbfdff;cursor:pointer;transition:background .1s}.ri:hover{background:var(--bl)}.num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}.num.ok{background:#d1fae5;color:#065f42}.num.wr{background:#fef3c7;color:#92400e}.num.dr{background:#fce4ec;color:var(--dr-t)}.nm{font-size:13px;font-weight:900}.mt2{font-size:10px;color:var(--sub)}.bar{height:7px;background:#edf2f7;border-radius:999px;overflow:hidden}.fill{height:100%;border-radius:999px}.fill.ok{background:var(--ok)}.fill.wr{background:var(--wr)}.fill.dr{background:var(--dr)}.rt{font-size:12px;font-weight:900;text-align:right}.rt.ok{color:var(--ok)}.rt.wr{color:var(--wr)}.rt.dr{color:var(--dr)}.stl{font-size:9px;font-weight:800;text-align:center;padding:2px 5px;border-radius:5px}.stl.ok{background:var(--ok-bg);color:#065f42}.stl.wr{background:var(--wr-bg);color:#7c3a06}.stl.dr{background:var(--dr-bg);color:var(--dr-t)}.arrow{color:var(--mu);font-size:14px}
.legend{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:11px;color:var(--sub)}.ld{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.rank-toggle{text-align:center;padding:10px;font-size:13px;font-weight:800;color:var(--br);cursor:pointer;border-top:1px solid var(--ln);margin-top:8px;transition:background .15s}.rank-toggle:hover{background:var(--bl);border-radius:0 0 12px 12px}.rank-toggle.expanded{color:var(--mu)}
.drill{margin-top:14px;display:none}.drill.open{display:block;animation:drillIn .3s ease}@keyframes drillIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.dr-head{background:var(--s);border:1px solid var(--ln);border-radius:var(--r) var(--r) 0 0;padding:12px 18px;font-size:13px;font-weight:900;box-shadow:var(--sh);cursor:pointer;display:flex;justify-content:space-between;align-items:center}.dr-body{background:var(--s);border:1px solid var(--ln);border-top:none;border-radius:0 0 var(--r) var(--r);padding:18px;box-shadow:var(--sh)}.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}.mc{background:#f8fafc;border-radius:12px;padding:12px;text-align:center}.mc .l{font-size:10px;color:var(--sub)}.mc .v{font-size:22px;font-weight:900;margin-top:3px}.mc .v.dr{color:var(--dr)}.mc .s{font-size:10px;color:var(--mu);margin-top:2px}
/* ドリルダウン チャート */
.drill-chart{height:320px;min-height:0}
/* ドリルダウン KPIカード */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.kc{background:var(--s);border:1px solid var(--ln);border-radius:14px;padding:14px 16px;box-shadow:0 2px 6px rgba(10,22,42,.04)}
.kc h3{font-size:13px;font-weight:800;margin:0 0 4px}.kc .period{font-size:10px;color:var(--sub)}.kc .val{font-size:26px;font-weight:900;line-height:1.15;margin:4px 0}.kc .val.dr{color:var(--dr)}.kc .unit{font-size:13px;font-weight:400;color:var(--sub)}
.kc .tgt-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding:5px 8px;background:#f8f9fa;border-radius:8px;border:1px dashed var(--ln)}.kc .tgt-label{font-size:9px;color:var(--mu);font-weight:700}.kc .tgt-val{font-size:12px;font-weight:800;color:var(--sub)}.kc .gap-val{font-size:12px;font-weight:900;margin-left:auto}.kc .gap-val.dr{color:var(--dr)}.kc .gap-val.wr{color:var(--wr)}.kc .gap-val.ok{color:var(--ok)}
.kc .prog{margin-top:4px}.kc .prog-bar{height:5px;background:#edf2f7;border-radius:999px;overflow:hidden}.kc .prog-fill{height:100%;border-radius:999px}.kc .prog-fill.ok{background:var(--ok)}.kc .prog-fill.wr{background:var(--wr)}.kc .prog-fill.dr{background:var(--dr)}.kc .prog-meta{display:flex;justify-content:space-between;margin-top:2px}.kc .prog-pct{font-size:10px;font-weight:800}.kc .prog-pct.dr{color:var(--dr)}.kc .prog-pct.wr{color:var(--wr)}.kc .prog-pct.ok{color:var(--ok)}.kc .prog-st{font-size:8px;font-weight:800;padding:1px 5px;border-radius:4px}.kc .prog-st.dr{background:var(--dr-bg);color:var(--dr-t)}.kc .prog-st.wr{background:var(--wr-bg);color:#7c3a06}.kc .prog-st.ok{background:var(--ok-bg);color:#065f42}
/* ドリルダウン チャートグリッド */
.charts-container{display:grid;gap:12px;margin-top:12px}
.charts-container.layout-2plus1{grid-template-columns:1fr 1fr}
.charts-container.layout-2plus1 .chart3-panel{grid-column:1/-1}
.charts-container.layout-2x2{grid-template-columns:1fr 1fr}
.charts-container.layout-3{grid-template-columns:repeat(3,1fr)}
.cpnl{background:var(--s);border:1px solid var(--ln);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}.cpnl h4{font-size:13px;font-weight:800;margin:0 0 8px;color:var(--sub);min-width:0}
.ft{text-align:center;font-size:11px;color:var(--mu);padding:20px 0;border-top:1px solid var(--ln);margin-top:20px}
@media(max-width:768px){.tabs{display:flex;overflow:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{min-width:150px;flex:0 0 auto}.tab .big{font-size:22px}.sum{grid-template-columns:1fr}.bx-main .main-val{font-size:24px}.main{grid-template-columns:1fr}.chart{height:220px}.ri{grid-template-columns:24px 1fr auto}.bar,.stl{display:none}.drill-chart{height:200px}.drill-graphs{grid-template-columns:1fr}.role{display:none}.hdr .row{flex-direction:column;align-items:flex-start}
/* ★モバイル: KPIカード2列化・チャート1列化・はみ出し防止 */
.kpi-row{grid-template-columns:repeat(2,1fr) !important;gap:8px}
.charts-container,.charts-container.layout-2plus1,.charts-container.layout-2x2,.charts-container.layout-3{grid-template-columns:1fr !important}
.charts-container.layout-2plus1 .chart3-panel{grid-column:auto}
.cpnl{overflow:hidden}.pnl{overflow:hidden}
.w{overflow-x:hidden}
.tb{gap:6px}.grp{flex-wrap:wrap}
/* ★モバイル: ヘッダー自動非表示 */
.hdr{transition:transform .3s ease}.hdr.hdr-hidden{transform:translateY(-100%)}
}
</style>
</head>
<body>
<header class="hdr">
<div class="row">
  <div class="left"><span class="badge">DETAIL</span><span class="title">📊 統合詳細ダッシュボード</span></div>
  <div class="right">
    <div class="role"><a href="#" class="active" onclick="presetDoctor(event)">🩺 医師向け</a><a href="#" onclick="presetNurse(event)">🏥 看護師向け</a></div>
    <a class="act" href="#" onclick="window.print()">🖨️ 印刷</a>
    <span class="meta">📅 {{ base_date }}</span>
    <button class="dm-btn" onclick="toggleDarkMode()">🌙</button>
  </div>
</div>
<nav class="nav-bar">
  <a href="portal.html">🏥 ポータル</a>
  <a href="detail.html" class="active">📊 統合詳細</a>
  <a href="dept.html">🩺 部門別</a>
</nav>
</header>

<div class="w">
  <nav class="tabs" id="kpiTabs"></nav>
  <div class="sum" id="summaryBar"></div>
  <div class="tb" id="toolbar"></div>

  <section class="main">
    <div class="pnl pnl-chart"><h3 id="chartTitle">📊 推移グラフ</h3><div class="chart" id="mainChart"></div></div>
    <div class="pnl pnl-rank">
      <h3 id="rankTitle">🏆 達成状況</h3>
      <div class="rk" id="rankList"></div>
      <div id="rankToggle" class="rank-toggle" style="display:none" onclick="toggleRankAll()">もっと見る &#9662;</div>
      <div class="legend"><span><span class="ld" style="background:#0e7a54"></span>▲ 達成</span><span><span class="ld" style="background:#b45309"></span>― 接近</span><span><span class="ld" style="background:#c4314b"></span>▼ 未達</span></div>
    </div>
  </section>

  <div class="drill" id="drillPanel">
    <div class="dr-head" id="drillHead" onclick="closeDrill()">📋 <span id="drillName"></span> の詳細 <span style="color:var(--mu)">✕</span></div>
    <div class="dr-body">
      <div class="kpi-row" id="drillKpiCards"></div>
      <div id="drillComment" style="display:none;margin:10px 0 12px;padding:10px 14px;background:#f8fafc;border-radius:10px;font-size:13px;color:var(--sub)"></div>
      <div id="drillChartsWrap" class="charts-container layout-2plus1">
        <div class="cpnl"><h4 id="drillLabel1">🚪 新入院 推移</h4><div class="drill-chart" id="drillChartAdm"></div></div>
        <div class="cpnl"><h4 id="drillLabel2">🛏️ 在院 推移</h4><div class="drill-chart" id="drillChartInp"></div></div>
        <div class="cpnl chart3-panel"><h4 id="drillLabel3">💉 全麻 推移</h4><div class="drill-chart" id="drillChartOp"></div></div>
        <div class="cpnl" id="drillChart4panel" style="display:none"><h4 id="drillLabel4">💰 月次粗利 推移</h4><div class="drill-chart" id="drillChartProfit"></div></div>
      </div>
    </div>
  </div>

  <div class="ft">🏥 診療ダッシュボード 統合詳細 ｜ 生成 {{ generated_at }} ｜ 基準日 {{ base_date }}</div>
</div>

<script>
const DATA = {{ data_json|safe }};

let currentTab = 'admission';
let currentAxis = 'dept';
let currentPeriod = '12w';
const hasProfit = !!(DATA.profit && DATA.profit.kpi);
let showWeekday = true;
let showHoliday = true;
let showMA7 = true;
let showMA28 = true;
let showDaily = false;
let currentDrill = null;  // ★課題4: 開いているドリルダウン名を保持
let admType = 'all';  // 新入院種別フィルタ: 'all' | 'planned' | 'emergency'
let rankSort = 'gap_asc';  // ソート: 'rate_desc'|'rate_asc'|'gap_desc'|'gap_asc'

// ★モバイル判定: Plotly chart height をビューポート幅で切替
function _pH(desktop) { return window.innerWidth <= 768 ? 200 : desktop; }

document.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#','');
  const params = new URLSearchParams(location.hash.includes('?') ? location.hash.split('?')[1] : '');
  if (['inpatient','admission','operation','profit'].includes(hash.split('?')[0])) currentTab = hash.split('?')[0];
  if (params.get('axis')) currentAxis = params.get('axis');
  renderTabs(); renderAll();
});

// ★課題4: タブに大きい数字＋期間ラベルを明記
function renderTabs() {
  const bd = DATA.meta.base_date;
  const tabs = [
    {id:'inpatient', icon:'🛏️', name:'在院患者',
     big:`${DATA.kpi.inpatient.actual}人`, per:`${bd} 時点の在院数`,
     st:DATA.kpi.inpatient.status},
    {id:'admission', icon:'🚪', name:'新入院',
     big:`${DATA.kpi.admission.actual_7d}人`, per:`直近7日累計`,
     st:DATA.kpi.admission.status},
    {id:'operation', icon:'💉', name:'全身麻酔手術',
     big:`${DATA.kpi.operation.daily_avg}件/日`, per:`直近7平日平均`,
     st:DATA.kpi.operation.status},
  ];
  if (hasProfit) {
    const pk = DATA.profit.kpi;
    const pSt = pk.hospital_achievement >= 100 ? {css:'ok',shape:'▲',text:'達成'} : pk.hospital_achievement >= 90 ? {css:'wr',shape:'―',text:'接近'} : {css:'dr',shape:'▼',text:'未達'};
    tabs.push({id:'profit', icon:'💰', name:'粗利',
      big:`${pk.hospital_total}百万円`, per:`${pk.base_month} 全科合計`,
      st:pSt});
  }
  document.getElementById('kpiTabs').innerHTML = tabs.map(t =>
    `<div class="tab${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">
      <div class="nm">${t.icon} ${t.name} <span class="st">${t.st.shape} ${t.st.text}</span></div>
      <div class="big">${t.big}</div>
      <div class="per">${t.per}</div>
    </div>`
  ).join('');
}

function switchTab(id) {
  currentTab = id;
  if (id === 'operation' || id === 'profit') currentAxis = 'dept';
  admType = 'all';   // タブ切替でフィルタリセット
  rankSort = id === 'profit' ? 'rate_desc' : 'gap_asc';
  renderTabs(); renderAll();
}
function setAxis(ax, btn) {
  currentAxis = ax;
  btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));

// ── ステータスヘルパー (ドリルパネル用) ──
function stCss(rate) { return rate==null?'mu':rate<90?'dr':rate<100?'wr':'ok'; }
function stShape(rate) { return rate==null?'—':rate<90?'▼':rate<100?'―':'▲'; }
function stText(rate) { return rate==null?'—':rate<90?'未達':rate<100?'接近':'達成'; }

// ── KPIカード HTML生成 (ドリルパネル用) ──
function kpiCardHtml(c) {
  const sc = stCss(c.rate);
  const ss = stShape(c.rate);
  const st = stText(c.rate);
  const barW = Math.min((c.rate||0)/1.5, 100);
  const gap = c.target != null ? (c.actual - c.target) : null;
  const gapStr = gap != null ? (gap > 0 ? '+' : '') + Math.round(gap*10)/10 + (c.gapUnit||c.unit) : '—';
  return `<div class="kc">
    <h3>${c.icon} ${c.label}</h3>
    ${c.period ? `<div class="period">${c.period}</div>` : ''}
    <div class="val ${sc==='dr'?'dr':''}">${c.actual!=null?c.actual:'—'}<span class="unit">${c.unit}</span></div>
    ${c.sub ? `<div style="font-size:11px;color:var(--sub);margin-top:3px">${c.sub}</div>` : ''}
    ${c.target!=null ? `<div class="tgt-row">
      <span style="font-size:11px">🎯</span>
      <span class="tgt-label">${c.targetLabel||'目標'}</span>
      <span class="tgt-val">${c.target}${c.unit}</span>
      <span class="gap-val ${sc}">${gapStr}</span>
    </div>
    <div class="prog">
      <div class="prog-bar"><div class="prog-fill ${sc}" style="width:${barW}%"></div></div>
      <div class="prog-meta">
        <span class="prog-pct ${sc}">${c.rate!=null?c.rate+'%':'—'}</span>
        <span class="prog-st ${sc}">${ss} ${st}</span>
      </div>
    </div>` : `<div style="font-size:10px;color:var(--mu);margin-top:6px">目標未設定</div>`}
  </div>`;
}

/* 前年同期比: ±5%で上向き/横ばい/下向き判定 */
function yoyDir(curr, prev) {
  if (prev == null || curr == null || prev === 0) return {css:'mu', label:'― データなし'};
  const pct = (curr - prev) / Math.abs(prev) * 100;
  if (pct > 5)  return {css:'ok', label:'▲ 上向き'};
  if (pct < -5) return {css:'dr', label:'▼ 下向き'};
  return {css:'wr', label:'― 横ばい'};
}

/* サブカード（比較バー付き）HTML生成 */
function refCardHtml(r) {
  const dir = yoyDir(r.curr, r.prev);
  // ★refTarget が指定されている場合: バーは目標達成率で塗る
  const barBase = r.refTarget != null ? r.refTarget : r.prev;
  const fillPct = (barBase != null && barBase > 0 && r.curr != null)
    ? Math.min(r.curr / barBase * 100, 150) : 0;
  const barW = Math.min(fillPct / 1.5, 100);
  const barCss = r.refTarget != null
    ? (fillPct >= 100 ? 'ok' : fillPct >= 90 ? 'wr' : 'dr')
    : dir.css;
  const prevText = r.prevLabel || (r.prev != null ? `対照 ${r.prev}${r.unit||''}` : '対照 —');
  // ★目標行（達成率%はバー下へ移動）
  let tgtHtml = '', rateHtml = '';
  if (r.refTarget != null && r.curr != null) {
    const gap = Math.round((r.curr - r.refTarget)*10)/10;
    const rate = Math.round(r.curr / r.refTarget * 1000)/10;
    const tc = rate >= 100 ? 'ok' : rate >= 90 ? 'wr' : 'dr';
    const gapPfx = gap > 0 ? '+' : '';
    const stLabel = rate >= 100 ? '▲ 達成' : rate >= 90 ? '― 接近' : '▼ 未達';
    tgtHtml = `<div style="display:flex;align-items:center;gap:6px;margin-top:6px;padding:5px 8px;background:#f8f9fa;border-radius:8px;border:1px dashed var(--ln)">
      <span style="font-size:11px">🎯</span>
      <span style="font-size:12px;color:var(--mu);font-weight:700">${r.refTargetLabel||'目標'}</span>
      <span style="font-size:13px;font-weight:800;color:var(--sub)">${r.refTarget}${r.unit||''}</span>
      <span style="font-size:13px;font-weight:900;margin-left:auto" class="gap-val ${tc}">${gapPfx}${gap}${r.unit||''}</span>
    </div>`;
    rateHtml = `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px">
      <span class="prog-pct ${tc}" style="font-size:12px;font-weight:900">${rate}%</span>
      <span class="prog-st ${tc}" style="font-size:10px;font-weight:900;padding:2px 7px;border-radius:5px">${stLabel}</span>
    </div>`;
  }
  return `<div class="bx">
    <div class="k">${r.k}</div>
    <div class="v${r.dr?' dr':''}">${r.v}</div>
    ${tgtHtml}
    <div class="cmp-bar" style="margin-top:${r.refTarget!=null?'6':'8'}px"><div class="cmp-fill ${barCss}" style="width:${barW}%"></div></div>
    ${rateHtml}
    <div class="cmp-meta" style="margin-top:4px">
      <span class="cmp-prev">${prevText}</span>
      <span class="cmp-dir ${dir.css}">${dir.label}</span>
    </div>
  </div>`;
}

function periodCutoff() {
  const bd = DATA.meta.base_date;
  if (currentPeriod === '12w') return new Date(new Date(bd) - 12*7*86400000).toISOString().slice(0,10);
  if (currentPeriod === '24w') return new Date(new Date(bd) - 24*7*86400000).toISOString().slice(0,10);
  return new Date(new Date(bd) - 365*86400000).toISOString().slice(0,10); // 365d
}

// ★クライアント側で7日移動平均を計算（フィルタ済みデータ用）
function calcMA(values, w) {
  const ma = [];
  for (let i = 0; i < values.length; i++) {
    let sum = 0, cnt = 0;
    for (let j = Math.max(0, i-w+1); j <= i; j++) {
      if (values[j] !== null) { sum += values[j]; cnt++; }
    }
    ma.push(cnt > 0 ? Math.round(sum/cnt*10)/10 : null);
  }
  return ma;
}
function calcMA7(v) { return calcMA(v, 7); }
function calcMA28(v) { return calcMA(v, 28); }
// ★暦日ベースの7日ローリング合計（手術データは歯抜けなのでインデックスではなく日付でウィンドウを取る）
function calcRollingSumByDate(dates, values, windowDays) {
  const rs = [];
  for (let i = 0; i < dates.length; i++) {
    const endMs = new Date(dates[i]).getTime();
    const startMs = endMs - (windowDays - 1) * 86400000;
    let sum = 0;
    for (let j = 0; j <= i; j++) {
      const dMs = new Date(dates[j]).getTime();
      if (dMs >= startMs && dMs <= endMs) {
        if (values[j] !== null) sum += values[j];
      }
    }
    rs.push(sum);
  }
  return rs;
}
// ★暦日ベースの28日合計÷4（過去4週平均）
function calcRollingAvg4wByDate(dates, values) {
  const rs = [];
  for (let i = 0; i < dates.length; i++) {
    const endMs = new Date(dates[i]).getTime();
    const startMs = endMs - 27 * 86400000;
    let sum = 0;
    for (let j = 0; j <= i; j++) {
      const dMs = new Date(dates[j]).getTime();
      if (dMs >= startMs && dMs <= endMs) {
        if (values[j] !== null) sum += values[j];
      }
    }
    rs.push(Math.round(sum / 4 * 10) / 10);
  }
  return rs;
}

// ★平日/休日フィルタ適用
function filterByDayType(dates, values, isWeekday) {
  const fd = [], fv = [];
  for (let i = 0; i < dates.length; i++) {
    const wd = isWeekday[i];
    if ((wd && showWeekday) || (!wd && showHoliday)) {
      fd.push(dates[i]); fv.push(values[i]);
    }
  }
  return {dates: fd, values: fv};
}

function renderChart() {
  if (currentTab === 'profit') { renderProfitChart(); return; }
  if (currentTab === 'operation') { renderOperationChart(); return; }
  const trend = DATA.trend[currentTab];
  if (!trend || !trend.dates.length) return;
  const cutoff = periodCutoff();

  // ★新入院種別フィルタ: admType に応じた値配列を選択
  const rawVals = (currentTab === 'admission' && admType !== 'all' && trend[admType])
    ? trend[admType] : trend.values || [];

  // ★修正: 全データで平日/休日フィルタ→MA計算→その後に期間切り取り
  const fAll = filterByDayType(trend.dates, rawVals, trend.is_weekday||[]);
  const fAllMA7 = calcMA7(fAll.values);
  const fAllMA28 = calcMA28(fAll.values);

  // 期間で切り取り
  const si = Math.max(0, fAll.dates.findIndex(d => d >= cutoff));
  const fDates = fAll.dates.slice(si);
  const fVals = fAll.values.slice(si);
  const fMA7 = fAllMA7.slice(si);

  // 種別フィルタ中は目標ラインを非表示
  const showTarget = !(currentTab === 'admission' && admType !== 'all');
  // ★在院: 平日/休日チェック状態で目標切替（両方=全日583, 平日のみ=600, 休日のみ=550）
  let tgt;
  if (currentTab === 'inpatient') {
    if (showWeekday && showHoliday) tgt = DATA.kpi.inpatient.target_allday;
    else if (showWeekday) tgt = DATA.kpi.inpatient.target_weekday;
    else tgt = DATA.kpi.inpatient.target_holiday;
  } else {
    tgt = Math.round(DATA.kpi.admission.target_weekly / 7);
  }
  const traces = [];

  const fMA28 = fAllMA28.slice(si);

  // ★日次実績（細い点線）
  if (showDaily) {
    traces.push({name:'日次実績', x:fDates, y:fVals, type:'scatter', mode:'lines',
      line:{color:'#94A3B8',width:1,dash:'dot'}, opacity:0.7});
  }
  // ★ 7日移動平均（緑太線）
  if (showMA7) {
    traces.push({name:'7日移動平均', x:fDates, y:fMA7, type:'scatter', mode:'lines',
      line:{color:'#0D9488',width:2.5}});
  }
  // ★ 28日移動平均（オレンジ実線）
  if (showMA28) {
    traces.push({name:'28日移動平均', x:fDates, y:fMA28, type:'scatter', mode:'lines',
      line:{color:'#e67e22',width:2}});
  }
  // ★目標ライン（種別フィルタ中は非表示）
  const tgtLabel = currentTab==='inpatient' ? (showWeekday&&showHoliday?'全日目標':'平日/休日目標') : '目標';
  if (fDates.length && showTarget) {
    traces.push({name:`${tgtLabel} ${tgt}`, x:[fDates[0],fDates[fDates.length-1]], y:[tgt,tgt],
      type:'scatter', mode:'lines', line:{color:'#C0293B',width:2,dash:'dot'}});
  }
  // ★ゾーン凡例用ダミートレース
  if (showTarget) {
    traces.push({name:'達成ゾーン', x:[null], y:[null], type:'scatter', mode:'lines',
      line:{width:8,color:'rgba(22,163,74,0.3)'}, showlegend:true});
    traces.push({name:'注意ゾーン', x:[null], y:[null], type:'scatter', mode:'lines',
      line:{width:8,color:'rgba(245,158,11,0.35)'}, showlegend:true});
  }

  // ★Y軸範囲
  const allY = [...(showDaily?fVals:[]),...(showMA7?fMA7:[]),...(showMA28?fMA28:[]),...(showTarget?[tgt]:[])].filter(v=>v!=null);
  const yMin=Math.min(...allY), yMax=Math.max(...allY), yPad=(yMax-yMin)*.08||5;
  const yLo = Math.max(0,Math.floor(yMin-yPad)), yHi = Math.ceil(yMax+yPad);

  // ★ゾーン色分け（種別フィルタ中はゾーン非表示）
  const shapes = [];
  if (showTarget) {
    shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt,y1:yHi,
      fillcolor:'rgba(22,163,74,0.08)',line:{width:0}});
    shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt*0.95,y1:tgt,
      fillcolor:'rgba(245,158,11,0.10)',line:{width:0}});
  }

  const pLabels = {'12w':'直近12週','24w':'直近24週','365d':'直近365日'};
  const dayLabel = (showWeekday&&showHoliday)?'':showWeekday?' 平日のみ':' 休日のみ';
  const layout = {
    font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},
    xaxis:{gridcolor:'#DCE1E9',tickformat:'%m/%d',tickangle:-45},
    yaxis:{range:[yLo,yHi],gridcolor:'#DCE1E9',title:{text:'',font:{size:10}}},
    legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},
    hovermode:'x unified',
    margin:{l:50,r:20,t:10,b:55},height:_pH(340),
    plot_bgcolor:'#fff',paper_bgcolor:'#fff',
    shapes: shapes,
  };
  Plotly.newPlot('mainChart',traces,layout,{responsive:true});
  const titles = {inpatient:'在院患者数',admission:'新入院患者数'};
  const admLabel = currentTab==='admission' && admType!=='all' ? (admType==='planned'?' ／ 予定入院':' ／ 緊急入院') : '';
  document.getElementById('chartTitle').textContent = `📊 ${titles[currentTab]||''} ${admLabel} 推移（${pLabels[currentPeriod]}${dayLabel}）`;
}

// ★全身麻酔 病院全体グラフ: 30平日移動平均 + 昨年度比較
function renderOperationChart() {
  const trend = DATA.trend.operation;
  if (!trend) return;
  const cutoff = periodCutoff();
  const tgt = DATA.kpi.operation.target; // 21件/日
  const traces = [], yV = [];

  // ★日次実績（平日のみ）: trend.dates/valuesから平日だけ抽出
  if (showDaily && trend.dates && trend.dates.length) {
    const fd = [], fv = [];
    for (let i = 0; i < trend.dates.length; i++) {
      if (trend.is_weekday && trend.is_weekday[i]) {
        fd.push(trend.dates[i]); fv.push(trend.values[i]);
      }
    }
    const si = Math.max(0, fd.findIndex(d => d >= cutoff));
    const ds = fd.slice(si), vs = fv.slice(si);
    traces.push({name:'日次実績（平日）', x:ds, y:vs, type:'scatter', mode:'lines',
      line:{color:'#94A3B8',width:1,dash:'dot'}, opacity:0.7});
    yV.push(...vs.filter(v=>v!=null));
  }

  // ★30平日移動平均（当年度）: biz_ma30
  const bm = trend.biz_ma30;
  if (showMA7 && bm && bm.dates && bm.dates.length) {
    const si = Math.max(0, bm.dates.findIndex(d => d >= cutoff));
    const ds = bm.dates.slice(si), vs = bm.values.slice(si);
    traces.push({name:'30平日移動平均', x:ds, y:vs, type:'scatter', mode:'lines',
      line:{color:'#0D9488',width:2.5}});
    yV.push(...vs.filter(v=>v!=null));
  }

  // ★昨年度30平日移動平均: biz_ma30_prev（色を変え細線）
  const bp = trend.biz_ma30_prev;
  if (showMA28 && bp && bp.dates && bp.dates.length) {
    const si = Math.max(0, bp.dates.findIndex(d => d >= cutoff));
    const ds = bp.dates.slice(si), vs = bp.values.slice(si);
    traces.push({name:'昨年度30平日移動平均', x:ds, y:vs, type:'scatter', mode:'lines',
      line:{color:'#94A3B8',width:1.5}});
    yV.push(...vs.filter(v=>v!=null));
  }

  // ★目標ライン
  if (tgt && yV.length) {
    const allDates = traces.flatMap(t => t.x || []).filter(Boolean);
    const minD = allDates.length ? allDates[0] : null;
    const maxD = allDates.length ? allDates[allDates.length-1] : null;
    if (minD && maxD) {
      traces.push({name:`平日目標 ${tgt}件/日`, x:[minD,maxD], y:[tgt,tgt],
        type:'scatter', mode:'lines', line:{color:'#C0293B',width:2,dash:'dot'}});
      yV.push(tgt);
    }
  }

  // ★ゾーン凡例用ダミー
  traces.push({name:'達成ゾーン', x:[null], y:[null], type:'scatter', mode:'lines',
    line:{width:8,color:'rgba(22,163,74,0.3)'}, showlegend:true});
  traces.push({name:'注意ゾーン', x:[null], y:[null], type:'scatter', mode:'lines',
    line:{width:8,color:'rgba(245,158,11,0.35)'}, showlegend:true});

  // ★Y軸
  const mn = yV.length ? Math.min(...yV) : 0, mx = yV.length ? Math.max(...yV) : 30;
  const pd = (mx - mn) * 0.08 || 3;
  const yLo = Math.max(0, Math.floor(mn - pd)), yHi = Math.ceil(mx + pd);

  // ★ゾーン背景
  const shapes = [];
  if (tgt) {
    shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt,y1:yHi,
      fillcolor:'rgba(22,163,74,0.08)',line:{width:0}});
    shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt*0.95,y1:tgt,
      fillcolor:'rgba(245,158,11,0.10)',line:{width:0}});
  }

  const pLabels = {'12w':'直近12週','24w':'直近24週','365d':'直近365日'};
  Plotly.newPlot('mainChart', traces, {
    font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},
    xaxis:{gridcolor:'#DCE1E9',tickformat:'%m/%d',tickangle:-45},
    yaxis:{range:[yLo,yHi],gridcolor:'#DCE1E9',title:{text:'件/平日',font:{size:10}}},
    legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},
    hovermode:'x unified',
    margin:{l:50,r:20,t:10,b:55},height:_pH(340),
    plot_bgcolor:'#fff',paper_bgcolor:'#fff',shapes,
  },{responsive:true});
  document.getElementById('chartTitle').textContent = `📊 全身麻酔手術 推移（${pLabels[currentPeriod]}・平日基準）`;
}

// ★課題1: 折りたたみバグ修正（クラス付け外しで制御）
const RANK_SHOW = 10;
let rankExpanded = false;

function renderRanking() {
  if (currentTab === 'profit') { renderProfitRanking(); return; }
  const raw = (DATA.perf[currentTab]||{})[currentAxis] || [];

  // クライアントサイドソート（差分も計算）
  const items = raw.map(r => ({...r, gap: r.target != null ? Math.round((r.actual - r.target)*10)/10 : null}));
  const sortFns = {
    rate_desc: (a,b) => (b.rate??-Infinity) - (a.rate??-Infinity),
    rate_asc:  (a,b) => (a.rate??Infinity)  - (b.rate??Infinity),
    gap_desc:  (a,b) => (b.gap??-Infinity)  - (a.gap??-Infinity),
    gap_asc:   (a,b) => (a.gap??Infinity)   - (b.gap??Infinity),
  };
  items.sort(sortFns[rankSort] || sortFns.rate_desc);
  // ソート後に順位を振り直し
  items.forEach((r,i) => r.rank = i+1);

  const sortLabel = {rate_desc:'達成率↓',rate_asc:'達成率↑',gap_desc:'目標差↓',gap_asc:'目標差↑'}[rankSort];
  document.getElementById('rankTitle').textContent = `🏆 ${currentAxis==='dept'?'診療科別':'病棟別'} 達成状況（直近7日・${sortLabel}）`;
  rankExpanded = false;

  const isGapSort = rankSort.startsWith('gap');
  // 目標差ソート時: バー幅をリスト内の最大絶対値で正規化
  const maxAbsGap = isGapSort
    ? Math.max(...items.filter(x => x.gap != null).map(x => Math.abs(x.gap)), 1)
    : 1;

  document.getElementById('rankList').innerHTML = items.map((r,i) => {
    const gapStr = r.gap != null ? (r.gap > 0 ? `+${r.gap}` : `${r.gap}`) : '—';

    // ── バー ──
    let bw, barCss;
    if (isGapSort && r.gap != null) {
      bw = Math.round(Math.abs(r.gap) / maxAbsGap * 92);
      barCss = r.gap >= 0 ? 'ok' : 'dr';
    } else {
      bw = Math.min((r.rate||0), 200) / 2;
      barCss = r.status;
    }

    // ── 主表示値（右側大きい数字）・サブ行 ──
    let mainVal, mainCss, sub2;
    if (isGapSort) {
      mainVal = gapStr;
      mainCss = r.gap != null ? (r.gap >= 0 ? 'ok' : 'dr') : 'mu';
      sub2 = `達成率 ${r.rate != null ? r.rate+'%' : '—'}`;
    } else {
      mainVal = `${r.shape} ${r.rate != null ? r.rate+'%' : '—'}`;
      mainCss = r.status;
      sub2 = `${r.actual}/${r.target || '—'}`;
    }

    return `<div class="ri${i>=RANK_SHOW?' rank-extra':''}" onclick="openDrill('${r.name}')">
      <div class="num ${r.status}">${r.rank}</div>
      <div><div class="nm">${r.name}</div><div class="mt2">${sub2}</div></div>
      <div class="bar"><div class="fill ${barCss}" style="width:${bw}%"></div></div>
      <div class="rt ${mainCss}">${mainVal}</div>
      <div class="stl ${r.status}">${r.text}</div>
      <div class="arrow">›</div></div>`;
  }).join('');

  // 初期非表示
  document.querySelectorAll('.rank-extra').forEach(el => el.style.display = 'none');
  const tog = document.getElementById('rankToggle');
  const extra = items.length - RANK_SHOW;
  if (extra > 0) { tog.style.display='block'; tog.textContent=`もっと見る（+${extra}件）▾`; tog.classList.remove('expanded'); }
  else { tog.style.display='none'; }
}

function toggleRankAll() {
  rankExpanded = !rankExpanded;
  const tog = document.getElementById('rankToggle');
  document.querySelectorAll('.rank-extra').forEach(el => {
    el.style.display = rankExpanded ? 'grid' : 'none';  // ★修正: 'grid' を明示
  });
  if (rankExpanded) { tog.textContent='閉じる ▴'; tog.classList.add('expanded'); }
  else { const n=document.querySelectorAll('.rank-extra').length; tog.textContent=`もっと見る（+${n}件）▾`; tog.classList.remove('expanded'); }
}

    const yLo=Math.max(0,Math.floor(mn-pd)), yHi=Math.ceil(mx+pd);
    const shapes=[];
    if (targetVal) { shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:targetVal,y1:yHi,fillcolor:'rgba(22,163,74,0.08)',line:{width:0}}); shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:targetVal*0.95,y1:targetVal,fillcolor:'rgba(245,158,11,0.10)',line:{width:0}}); }
    Plotly.newPlot(elId,tr,{...LAYOUT,yaxis:{range:[yLo,yHi],gridcolor:'#DCE1E9'},shapes},{responsive:true});
  }

  function dRenderSurgeryChart(elId, td, weeklyTarget) {
    if (!td||!td.dates||!td.dates.length) {
      document.getElementById(elId).innerHTML='<div style="color:var(--mu);font-size:12px;text-align:center;padding:100px 0">データなし</div>'; return;
    }
    const fAll=(td.is_weekday&&td.is_weekday.length>0)?filterByDayType(td.dates,td.values||[],td.is_weekday):{dates:td.dates,values:td.values||[]};
    const allRS7=calcRollingSumByDate(fAll.dates,fAll.values,7), allRS7ma=calcMA(allRS7,4), allRS7ma28=calcMA(allRS7,28);
    const si=Math.max(0,fAll.dates.findIndex(x=>x>=cutoff));
    const ds=fAll.dates.slice(si), rs7=allRS7.slice(si), rs7ma=allRS7ma.slice(si), rs7ma28=allRS7ma28.slice(si);
    const tgt=weeklyTarget, tr=[], yV=[];
    if (showDaily) { tr.push({name:'週間実績',x:ds,y:rs7,type:'scatter',mode:'lines',line:{color:'#94A3B8',width:1,dash:'dot'},opacity:0.7}); yV.push(...rs7.filter(v=>v!=null)); }
    if (showMA7&&rs7ma.length) { tr.push({name:'4週移動平均',x:ds,y:rs7ma,type:'scatter',mode:'lines',line:{color:'#0D9488',width:2.5}}); yV.push(...rs7ma.filter(v=>v!=null)); }
    if (showMA28&&rs7ma28.length) { tr.push({name:'28日移動平均',x:ds,y:rs7ma28,type:'scatter',mode:'lines',line:{color:'#e67e22',width:2}}); yV.push(...rs7ma28.filter(v=>v!=null)); }
    if (tgt&&ds.length) { tr.push({name:`週目標 ${tgt}`,x:[ds[0],ds[ds.length-1]],y:[tgt,tgt],type:'scatter',mode:'lines',line:{color:'#C0293B',width:2,dash:'dot'}}); yV.push(tgt); }
    const mn=yV.length?Math.min(...yV):0, mx=yV.length?Math.max(...yV):10, pd=(mx-mn)*.08||1;
    const yLo=Math.max(0,Math.floor(mn-pd)), yHi=Math.ceil(mx+pd);
    const shapes=[];
    if (tgt) { shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt,y1:yHi,fillcolor:'rgba(22,163,74,0.08)',line:{width:0}}); shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt*0.95,y1:tgt,fillcolor:'rgba(245,158,11,0.10)',line:{width:0}}); }
    Plotly.newPlot(elId,tr,{...LAYOUT,yaxis:{range:[yLo,yHi],gridcolor:'#DCE1E9'},shapes},{responsive:true});
  }

  function dRenderFlowChart(elId, admTd, outTd) {
    if (!admTd||!outTd||!admTd.dates||!admTd.dates.length) {
      document.getElementById(elId).innerHTML='<div style="color:var(--mu);font-size:12px;text-align:center;padding:100px 0">データなし</div>'; return;
    }
    let dates=admTd.dates, aV=admTd.values||[], oV=outTd.values||[];
    if (admTd.is_weekday&&admTd.is_weekday.length>0) {
      const fd=[],fa=[],fo=[];
      admTd.dates.forEach((d,i)=>{ const wd=admTd.is_weekday[i]; if((wd&&showWeekday)||(!wd&&showHoliday)){fd.push(d);fa.push(aV[i]);fo.push(oV[i]!=null?oV[i]:0);} });
      dates=fd; aV=fa; oV=fo;
    }
    const netVals=aV.map((v,i)=>(v||0)-(oV[i]||0)), netMA7=calcMA(netVals,7);
    const si=Math.max(0,dates.findIndex(x=>x>=cutoff));
    const ds=dates.slice(si), adm=aV.slice(si), out=oV.slice(si), nm=netMA7.slice(si);
    const yV1=[...adm,...out.map(v=>-v)].filter(v=>v!=null);
    const mn1=yV1.length?Math.min(...yV1):-5, mx1=yV1.length?Math.max(...yV1):5;
    const pd1=(mx1-mn1)*0.08||1;
    const yAbs1=Math.max(Math.abs(mn1)+pd1, mx1+pd1);
    const yV2=nm.filter(v=>v!=null);
    const mn2=yV2.length?Math.min(...yV2):-3, mx2=yV2.length?Math.max(...yV2):3;
    const pd2=(mx2-mn2)*0.15||1;
    const yAbs2=Math.max(Math.abs(mn2)+pd2, mx2+pd2);
    Plotly.newPlot(elId,[
      {name:'入院+転入',x:ds,y:adm,type:'bar',marker:{color:'#0D9488'},opacity:0.75,yaxis:'y'},
      {name:'退院+転出',x:ds,y:out.map(v=>-v),type:'bar',marker:{color:'#e67e22'},opacity:0.75,yaxis:'y'},
      {name:'純増減 移動平均',x:ds,y:nm,type:'scatter',mode:'lines',line:{color:'#C0293B',width:2.5},yaxis:'y2'},
    ],{barmode:'relative',font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},
      xaxis:{gridcolor:'#DCE1E9',tickformat:'%m/%d',tickangle:-45},
      yaxis:{range:[-Math.ceil(yAbs1),Math.ceil(yAbs1)],gridcolor:'#DCE1E9',zeroline:true,zerolinecolor:'#888',zerolinewidth:1.5},
      yaxis2:{overlaying:'y',side:'right',range:[-Math.ceil(yAbs2),Math.ceil(yAbs2)],gridcolor:'transparent',zeroline:true,zerolinecolor:'#C0293B',zerolinewidth:1,tickfont:{size:10,color:'#C0293B'}},
      legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},hovermode:'x unified',margin:{l:45,r:45,t:8,b:50},height:_drillH,
      plot_bgcolor:'#fff',paper_bgcolor:'#fff'},{responsive:true});
  }

  function dRenderProfitChart(elId, bd) {
    if (!bd||!bd.months||!bd.months.length) {
      document.getElementById(elId).innerHTML='<div style="color:var(--mu);font-size:12px;text-align:center;padding:100px 0">粗利データなし</div>'; return;
    }
    const barColors=bd.months.map((_,i)=>{ const rate=bd.target?bd.values[i]/bd.target*100:0; return rate>=100?'#0e7a54':rate>=90?'#b45309':'#c4314b'; });
    const tr=[{name:'粗利実績',x:bd.months,y:bd.values,type:'bar',marker:{color:barColors},opacity:0.9}];
    if (bd.target) tr.push({name:'目標',x:[bd.months[0],bd.months[bd.months.length-1]],y:[bd.target,bd.target],type:'scatter',mode:'lines',line:{color:'#C0293B',width:2,dash:'dot'}});
    const allY=[...bd.values,...(bd.target?[bd.target]:[])].filter(v=>v!=null);
    const yMax=allY.length?Math.max(...allY)*1.15:10;
    Plotly.newPlot(elId,tr,{font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},xaxis:{gridcolor:'#DCE1E9',tickangle:-45},yaxis:{range:[0,yMax],gridcolor:'#DCE1E9',title:{text:'百万円',font:{size:10}}},legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},hovermode:'x unified',margin:{l:55,r:15,t:8,b:65},height:_pH(320),plot_bgcolor:'#fff',paper_bgcolor:'#fff'},{responsive:true});
  }

  // ── Chart Layout ──
  const _pLabels = {'12w':'直近12週','24w':'直近24週','365d':'直近365日'};
  const suffix = `（${_pLabels[currentPeriod]}）`;
  const admSuffix = admType==='planned'?' ／ 予定':admType==='emergency'?' ／ 緊急':'';
  const rawAdmTd = d.trend ? d.trend.admission : null;
  const filtAdmTd = (admType !== 'all' && rawAdmTd && rawAdmTd[admType])
    ? {...rawAdmTd, values: rawAdmTd[admType]} : rawAdmTd;
  const admChartTarget = admType==='all' ? (d.admission.target ? d.admission.target/7 : null) : null;

  document.getElementById('drillLabel1').textContent = `🚪 新入院${admSuffix} 推移${suffix}`;
  document.getElementById('drillLabel2').textContent = `🛏️ 在院患者 推移${suffix}`;
  dRenderOneChart('drillChartAdm', filtAdmTd, admChartTarget);
  dRenderOneChart('drillChartInp', d.trend?d.trend.inpatient:null, d.inpatient.target);

  if (isWard) {
    drillWrap.className = 'charts-container layout-2plus1';
    chart4panel.style.display = 'none';
    document.getElementById('drillLabel3').textContent = `🔄 入退院フロー${suffix}`;
    dRenderFlowChart('drillChartOp', d.trend?d.trend.admission:null, d.trend?d.trend.outflow:null);
  } else if (isSurgeryDept && hasProfitChart) {
    drillWrap.className = 'charts-container layout-2x2';
    chart4panel.style.display = '';
    document.getElementById('drillLabel3').textContent = `💉 全麻手術 推移${suffix}`;
    document.getElementById('drillLabel4').textContent = `💰 月次粗利 推移`;
    dRenderSurgeryChart('drillChartOp', d.trend?d.trend.operation:null, d.operation.target);
    dRenderProfitChart('drillChartProfit', d.profit_chart);
  } else if (isSurgeryDept) {
    drillWrap.className = 'charts-container layout-2plus1';
    chart4panel.style.display = 'none';
    document.getElementById('drillLabel3').textContent = `💉 全麻手術 推移${suffix}`;
    dRenderSurgeryChart('drillChartOp', d.trend?d.trend.operation:null, d.operation.target);
  } else if (hasProfitChart) {
    drillWrap.className = 'charts-container layout-2plus1';
    chart4panel.style.display = 'none';
    document.getElementById('drillLabel3').textContent = `💰 月次粗利 推移`;
    dRenderProfitChart('drillChartOp', d.profit_chart);
  } else {
    drillWrap.className = 'charts-container layout-2plus1';
    chart4panel.style.display = 'none';
    document.getElementById('drillLabel3').textContent = `— データなし`;
    document.getElementById('drillChartOp').innerHTML = '<div style="color:var(--mu);font-size:12px;text-align:center;padding:100px 0">対象データなし</div>';
  }

  currentDrill = name;
  document.getElementById('drillPanel').classList.add('open');
  document.getElementById('drillPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ════ PROFIT CHART ════
function profitMonthCount() {
  if (currentPeriod === '12w') return 3;
  if (currentPeriod === '24w') return 6;
  return 12; // 365d
}
function renderProfitChart() {
  if (!hasProfit) return;
  const raw = DATA.profit.chart.global;
  // 期間フィルタ
  const n = profitMonthCount();
  const g = {
    months:  raw.months.slice(-n),
    values:  raw.values.slice(-n),
    targets: raw.targets.slice(-n),
  };

  // 月ごとに達成率を計算して色分け
  const barColors = g.months.map((_, i) => {
    const val = g.values[i], tgt = g.targets[i];
    if (tgt == null || tgt === 0) return '#94A3B8';  // 目標なし: グレー
    const rate = val / tgt * 100;
    if (rate >= 100) return '#0e7a54';   // 達成: 緑
    if (rate >= 90)  return '#b45309';   // 接近: 黄
    return '#c4314b';                    // 未達: 赤
  });

  // 凡例用ダミートレース（色分け説明）
  const legendDummies = [
    {name:'▲ 達成（≥100%）', marker:{color:'#0e7a54'}},
    {name:'― 接近（90-99%）', marker:{color:'#b45309'}},
    {name:'▼ 未達（<90%）',  marker:{color:'#c4314b'}},
  ].map(d => ({...d, x:[null], y:[null], type:'bar', showlegend:true}));

  const traces = [
    {name:'粗利実績', x:g.months, y:g.values, type:'bar',
     marker:{color:barColors}, opacity:0.9, showlegend:false},
    {name:'月次目標', x:g.months, y:g.targets, type:'scatter', mode:'lines+markers',
     line:{color:'#C0293B',width:2,dash:'dot'}, marker:{size:5,color:'#C0293B'}},
    ...legendDummies,
  ];

  const allY = [...g.values, ...g.targets.filter(v=>v!=null)];
  const yMax = Math.max(...allY) * 1.15 || 10;
  Plotly.newPlot('mainChart', traces, {
    font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},
    xaxis:{gridcolor:'#DCE1E9',tickangle:-45},
    yaxis:{range:[0,yMax],gridcolor:'#DCE1E9',title:{text:'百万円',font:{size:10}}},
    legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},
    barmode:'group', hovermode:'x unified',
    margin:{l:55,r:20,t:10,b:65},height:_pH(340),
    plot_bgcolor:'#fff',paper_bgcolor:'#fff',
  },{responsive:true});
  document.getElementById('chartTitle').textContent = '📊 粗利 月次推移（全科合計・達成状況で色分け）';
}

function renderProfitRanking() {
  if (!hasProfit) return;
  const items = DATA.profit.ranking.map((r,i) => ({...r, rank:i+1}));
  // 目標差を事前計算
  items.forEach(r => { r.gap = r.target != null ? Math.round((r.actual - r.target)*10)/10 : null; });
  const sortFns = {
    rate_desc: (a,b) => (b.rate??-Infinity) - (a.rate??-Infinity),
    rate_asc:  (a,b) => (a.rate??Infinity)  - (b.rate??Infinity),
    gap_desc:  (a,b) => (b.gap??-Infinity)  - (a.gap??-Infinity),
    gap_asc:   (a,b) => (a.gap??Infinity)   - (b.gap??Infinity),
  };
  items.sort(sortFns[rankSort] || sortFns.rate_desc);
  items.forEach((r,i) => r.rank = i+1);

  const sortLabel = {rate_desc:'達成率↓',rate_asc:'達成率↑',gap_desc:'目標差↓',gap_asc:'目標差↑'}[rankSort];
  document.getElementById('rankTitle').textContent = `🏆 診療科別 粗利達成状況（${sortLabel}）`;
  rankExpanded = false;

  const isGapSort = rankSort.startsWith('gap');
  const maxAbsGap = isGapSort
    ? Math.max(...items.filter(x => x.gap != null).map(x => Math.abs(x.gap)), 1)
    : 1;

  document.getElementById('rankList').innerHTML = items.map((r,i) => {
    const gapStr = r.gap != null ? (r.gap >= 0 ? `+${r.gap}` : `${r.gap}`) + '百万' : '—';
    const momStr = r.mom != null ? (r.mom > 0 ? `+${r.mom}` : `${r.mom}`) + '百万' : '';

    let bw, barCss;
    if (isGapSort && r.gap != null) {
      bw = Math.round(Math.abs(r.gap) / maxAbsGap * 92);
      barCss = r.gap >= 0 ? 'ok' : 'dr';
    } else {
      bw = Math.min((r.rate||0), 200) / 2;
      barCss = r.status;
    }

    let mainVal, mainCss;
    if (isGapSort) {
      mainVal = gapStr;
      mainCss = r.gap != null ? (r.gap >= 0 ? 'ok' : 'dr') : 'mu';
    } else {
      mainVal = `${r.shape} ${r.rate != null ? r.rate+'%' : '—'}`;
      mainCss = r.status;
    }

    return `<div class="ri${i>=RANK_SHOW?' rank-extra':''}" onclick="openProfitDrill('${r.name}')">
      <div class="num ${r.status}">${r.rank}</div>
      <div><div class="nm">${r.name}</div><div class="mt2">${r.actual}百万 / 目標${r.target||'—'}百万 ${momStr?'<span style=\"color:'+(r.mom>=0?'var(--ok)':'var(--dr)')+'\">'+ momStr+'</span>':''}</div></div>
      <div class="bar"><div class="fill ${barCss}" style="width:${bw}%"></div></div>
      <div class="rt ${mainCss}">${mainVal}</div>
      <div class="stl ${r.status}">${r.text}</div>
      <div class="arrow">›</div></div>`;
  }).join('');

  document.querySelectorAll('.rank-extra').forEach(el => el.style.display = 'none');
  const tog = document.getElementById('rankToggle');
  const extra = items.length - RANK_SHOW;
  if (extra > 0) { tog.style.display='block'; tog.textContent=`もっと見る（+${extra}件）▾`; tog.classList.remove('expanded'); }
  else { tog.style.display='none'; }
}

function openProfitDrill(dept) {
  if (!hasProfit) return;
  const bd = DATA.profit.chart.by_dept[dept];
  if (!bd) { console.warn('profit drill data not found:', dept); return; }
  document.getElementById('drillName').textContent = dept;

  // KPIカード
  const rk = DATA.profit.ranking.find(r => r.name === dept) || {};
  const kpiRow = document.getElementById('drillKpiCards');
  kpiRow.innerHTML = kpiCardHtml({icon:'💰', label:'月次粗利', period:'今月', actual:rk.actual||0, unit:'百万円', gapUnit:'百万円', target:rk.target, rate:rk.rate})
    + kpiCardHtml({icon:'📊', label:'達成率', period:'今月', actual:rk.rate!=null?rk.rate+'%':null, unit:'', target:null, rate:rk.rate})
    + kpiCardHtml({icon:'📈', label:'前月比', period:'対前月', actual:rk.mom!=null?(rk.mom>0?'+':'')+rk.mom:null, unit:'百万円', target:null, rate:null});
  kpiRow.style.gridTemplateColumns = 'repeat(3,1fr)';
  document.getElementById('drillComment').style.display='none';

  // チャートレイアウト
  const drillWrap = document.getElementById('drillChartsWrap');
  const chart4panel = document.getElementById('drillChart4panel');
  drillWrap.className = 'charts-container layout-2plus1';
  chart4panel.style.display = 'none';

  document.getElementById('drillLabel1').textContent = '💰 月次粗利 推移';
  document.getElementById('drillLabel2').textContent = '📊 達成率 推移';
  document.getElementById('drillLabel3').textContent = '';

  // 粗利棒グラフ
  const traces1 = [{name:'粗利', x:bd.months, y:bd.values, type:'bar', marker:{color:'#0D9488'}, opacity:0.85}];
  if (bd.target) traces1.push({name:'目標', x:[bd.months[0],bd.months[bd.months.length-1]], y:[bd.target,bd.target], type:'scatter', mode:'lines', line:{color:'#C0293B',width:2,dash:'dot'}});
  const allY=[...bd.values,...(bd.target?[bd.target]:[])].filter(v=>v!=null);
  const yMax=allY.length?Math.max(...allY)*1.15:10;
  Plotly.newPlot('drillChartAdm', traces1, {font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},xaxis:{gridcolor:'#DCE1E9',tickangle:-45},yaxis:{range:[0,yMax],gridcolor:'#DCE1E9',title:{text:'百万円',font:{size:10}}},legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},hovermode:'x unified',margin:{l:55,r:15,t:8,b:65},height:_pH(320),plot_bgcolor:'#fff',paper_bgcolor:'#fff'},{responsive:true});

  // 達成率折れ線グラフ
  if (bd.achievements) {
    const achTraces = [
      {name:'達成率', x:bd.months, y:bd.achievements, type:'scatter', mode:'lines+markers', line:{color:'#0D9488',width:2.5}, marker:{size:5}},
      {name:'100%', x:[bd.months[0],bd.months[bd.months.length-1]], y:[100,100], type:'scatter', mode:'lines', line:{color:'#C0293B',width:2,dash:'dot'}},
    ];
    Plotly.newPlot('drillChartInp', achTraces, {font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},xaxis:{gridcolor:'#DCE1E9',tickangle:-45},yaxis:{gridcolor:'#DCE1E9',title:{text:'%',font:{size:10}}},legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},hovermode:'x unified',margin:{l:45,r:15,t:8,b:65},height:_pH(320),plot_bgcolor:'#fff',paper_bgcolor:'#fff'},{responsive:true});
  }
  document.getElementById('drillChartOp').innerHTML = '';

  currentDrill = dept;
  document.getElementById('drillPanel').classList.add('open');
  document.getElementById('drillPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDrill() {
  currentDrill = null;
  document.getElementById('drillPanel').classList.remove('open');
  ['drillChartAdm','drillChartInp','drillChartOp','drillChartProfit'].forEach(id => { try{Plotly.purge(id)}catch(e){} });
}
</script>
<script>
/* ★モバイル: ヘッダー自動非表示（スクロール↓で隠す / ↑で戻す） */
(function(){
  var hdr=document.querySelector('.hdr'),lastY=window.scrollY,ticking=false;
  window.addEventListener('scroll',function(){
    if(!ticking){requestAnimationFrame(function(){
      var y=window.scrollY;
      if(y>lastY&&y>60)hdr.classList.add('hdr-hidden');
      else if(y<lastY)hdr.classList.remove('hdr-hidden');
      lastY=y;ticking=false;
    });ticking=true;}
  });
})();
/* ダークモード */
(function(){
  var h=document.documentElement;
  var s=localStorage.getItem('theme');
  if(s==='dark'||(s===null&&window.matchMedia('(prefers-color-scheme:dark)').matches))h.setAttribute('data-theme','dark');
  window.toggleDarkMode=function(){
    var dark=h.getAttribute('data-theme')==='dark';
    dark?h.removeAttribute('data-theme'):h.setAttribute('data-theme','dark');
    localStorage.setItem('theme',dark?'light':'dark');
    var b=document.querySelector('.dm-btn');if(b)b.textContent=dark?'🌙':'☀️';
  };
  document.addEventListener('DOMContentLoaded',function(){
    var b=document.querySelector('.dm-btn');
    if(b)b.textContent=h.getAttribute('data-theme')==='dark'?'☀️':'🌙';
  });
})();
</script>
