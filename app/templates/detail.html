<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>統合詳細ダッシュボード</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
:root{--bg:#f6f8fb;--s:#fff;--ink:#1a2332;--sub:#5f7084;--mu:#9daab8;--ln:#dfe5ed;--br:#0e4da4;--bl:#e8f0fe;--bd:#0a3671;--dr:#c4314b;--dr-bg:#fdf0f2;--dr-t:#8c1d35;--wr:#b45309;--wr-bg:#fef7ee;--ok:#0e7a54;--ok-bg:#ecfdf5;--inf:#2563eb;--r:18px;--sh:0 4px 14px rgba(10,22,42,.08)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.hdr{position:sticky;top:0;z-index:10;background:var(--bd);color:#fff;padding:12px 24px;box-shadow:var(--sh)}.hdr .row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}.left{display:flex;align-items:center;gap:10px}.back{color:#a8bdd4;text-decoration:none;font-size:13px;font-weight:800}.badge{font-size:11px;background:var(--br);padding:3px 10px;border-radius:999px;font-weight:800}.title{font-size:17px;font-weight:900}.right{display:flex;align-items:center;gap:10px}.role{display:flex;gap:4px}.role a{font-size:12px;font-weight:800;text-decoration:none;padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.25);color:#a8bdd4;transition:all .15s}.role a.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.4)}.meta{font-size:12px;color:#a8bdd4}.act{color:#a8bdd4;text-decoration:none;font-size:12px}
.w{max-width:1280px;margin:0 auto;padding:16px 20px 48px}
/* ★課題4: タブを大きく、数字を目立たせる */
.tabs{display:grid;grid-template-columns:repeat(3,1fr);background:var(--s);border:1px solid var(--ln);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}.tab{padding:16px 18px;border-right:1px solid var(--ln);cursor:pointer;transition:background .15s}.tab:last-child{border-right:none}.tab:hover{background:#f8fafc}.tab.active{background:var(--br);color:#fff}.tab .nm{font-size:13px;font-weight:800}.tab .big{font-size:28px;font-weight:900;line-height:1.1;margin:4px 0}.tab .per{font-size:11px;color:var(--sub);margin-top:2px}.tab.active .per{color:rgba(255,255,255,.7)}.tab .st{display:inline-block;font-size:10px;font-weight:900;padding:2px 8px;border-radius:999px;margin-left:4px;background:var(--dr-bg);color:var(--dr-t)}.tab.active .st{background:rgba(255,255,255,.18);color:#fff}
.sum{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:10px;margin-top:12px}.bx{background:var(--s);border:1px solid var(--ln);border-radius:14px;padding:12px 14px;box-shadow:0 2px 6px rgba(10,22,42,.04)}.bx h2{font-size:16px;margin:0}.bx .k{font-size:11px;color:var(--sub);font-weight:600}.bx .v{font-size:24px;font-weight:900;margin-top:4px}.bx .v.dr{color:var(--dr)}
/* ★Plan-B: 実績+目標+差分 統合カード */
.bx-main{background:var(--s);border:1px solid var(--ln);border-radius:14px;padding:14px 16px;box-shadow:0 2px 6px rgba(10,22,42,.04)}.bx-main h2{font-size:14px;margin:0 0 6px;font-weight:800}.bx-main .period-note{font-size:11px;color:var(--sub);margin-bottom:4px}.bx-main .main-val{font-size:28px;font-weight:900;line-height:1.15}.bx-main .main-val.dr{color:var(--dr)}.bx-main .main-unit{font-size:14px;font-weight:400;color:var(--sub)}
.tgt-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 10px;background:#f8f9fa;border-radius:10px;border:1px dashed var(--ln)}.tgt-icon{font-size:12px}.tgt-label{font-size:10px;color:var(--mu);font-weight:700}.tgt-val{font-size:13px;font-weight:800;color:var(--sub)}.gap-val{font-size:13px;font-weight:900;margin-left:auto}.gap-val.dr{color:var(--dr)}.gap-val.wr{color:var(--wr)}.gap-val.ok{color:var(--ok)}
.prog-wrap{margin-top:6px}.prog-bar{height:6px;background:#edf2f7;border-radius:999px;overflow:hidden}.prog-fill{height:100%;border-radius:999px;transition:width .3s}.prog-fill.ok{background:var(--ok)}.prog-fill.wr{background:var(--wr)}.prog-fill.dr{background:var(--dr)}.prog-meta{display:flex;justify-content:space-between;align-items:center;margin-top:3px}.prog-pct{font-size:11px;font-weight:800}.prog-pct.dr{color:var(--dr)}.prog-pct.wr{color:var(--wr)}.prog-pct.ok{color:var(--ok)}.prog-status{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px}.prog-status.dr{background:var(--dr-bg);color:var(--dr-t)}.prog-status.wr{background:var(--wr-bg);color:#7c3a06}.prog-status.ok{background:var(--ok-bg);color:#065f42}
.tb{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px}.grp{display:flex;align-items:center;gap:5px}.gl{font-size:12px;font-weight:800;color:var(--sub)}.btn{background:var(--s);border:1px solid var(--ln);border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;color:var(--sub);cursor:pointer;box-shadow:0 1px 3px rgba(10,22,42,.04);transition:all .15s}.btn:hover{border-color:#93b4e4;color:var(--br)}.btn.active{background:var(--bl);border-color:#93b4e4;color:var(--br)}
.main{display:grid;grid-template-columns:1.15fr .85fr;gap:14px;margin-top:12px;align-items:start}.pnl-chart{position:sticky;top:60px}.pnl{background:var(--s);border:1px solid var(--ln);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}.pnl h3{margin:0 0 12px;font-size:14px;font-weight:800}
.chart{width:100%;height:360px}
.rk{display:grid;gap:6px}.ri{display:grid;grid-template-columns:26px 1fr 120px 55px 60px 16px;gap:6px;align-items:center;padding:10px;border:1px solid var(--ln);border-radius:12px;background:#fbfdff;cursor:pointer;transition:background .1s}.ri:hover{background:var(--bl)}.num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}.num.ok{background:#d1fae5;color:#065f42}.num.wr{background:#fef3c7;color:#92400e}.num.dr{background:#fce4ec;color:var(--dr-t)}.nm{font-size:13px;font-weight:900}.mt2{font-size:10px;color:var(--sub)}.bar{height:7px;background:#edf2f7;border-radius:999px;overflow:hidden}.fill{height:100%;border-radius:999px}.fill.ok{background:var(--ok)}.fill.wr{background:var(--wr)}.fill.dr{background:var(--dr)}.rt{font-size:12px;font-weight:900;text-align:right}.rt.ok{color:var(--ok)}.rt.wr{color:var(--wr)}.rt.dr{color:var(--dr)}.stl{font-size:9px;font-weight:800;text-align:center;padding:2px 5px;border-radius:5px}.stl.ok{background:var(--ok-bg);color:#065f42}.stl.wr{background:var(--wr-bg);color:#7c3a06}.stl.dr{background:var(--dr-bg);color:var(--dr-t)}.arrow{color:var(--mu);font-size:14px}
.legend{display:flex;gap:14px;justify-content:center;margin-top:10px;font-size:11px;color:var(--sub)}.ld{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.rank-toggle{text-align:center;padding:10px;font-size:13px;font-weight:800;color:var(--br);cursor:pointer;border-top:1px solid var(--ln);margin-top:8px;transition:background .15s}.rank-toggle:hover{background:var(--bl);border-radius:0 0 12px 12px}.rank-toggle.expanded{color:var(--mu)}
.drill{margin-top:14px;display:none}.drill.open{display:block;animation:drillIn .3s ease}@keyframes drillIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.dr-head{background:var(--s);border:1px solid var(--ln);border-radius:var(--r) var(--r) 0 0;padding:12px 18px;font-size:13px;font-weight:900;box-shadow:var(--sh);cursor:pointer;display:flex;justify-content:space-between;align-items:center}.dr-body{background:var(--s);border:1px solid var(--ln);border-top:none;border-radius:0 0 var(--r) var(--r);padding:18px;box-shadow:var(--sh)}.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}.mc{background:#f8fafc;border-radius:12px;padding:12px;text-align:center}.mc .l{font-size:10px;color:var(--sub)}.mc .v{font-size:22px;font-weight:900;margin-top:3px}.mc .v.dr{color:var(--dr)}.mc .s{font-size:10px;color:var(--mu);margin-top:2px}
/* ★課題5: ミニグラフ高さを5割増し 150→225px */
.drill-chart{height:225px;margin-top:0;min-height:0;overflow:hidden}
.ft{text-align:center;font-size:11px;color:var(--mu);padding:20px 0;border-top:1px solid var(--ln);margin-top:20px}
.drill-graphs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}.drill-graphs>div{min-width:0;overflow:hidden}
@media(max-width:768px){.tabs{display:flex;overflow:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{min-width:150px;flex:0 0 auto}.tab .big{font-size:22px}.sum{grid-template-columns:1fr}.bx-main .main-val{font-size:24px}.main{grid-template-columns:1fr}.chart{height:200px}.ri{grid-template-columns:24px 1fr auto}.bar,.stl{display:none}.drill-chart{height:160px}.drill-graphs{grid-template-columns:1fr}.role{display:none}.hdr .row{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<header class="hdr"><div class="row">
  <div class="left"><a class="back" href="portal.html">‹ ポータル</a><span class="badge">DETAIL</span><span class="title">📊 統合詳細ダッシュボード</span></div>
  <div class="right">
    <div class="role"><a href="#" class="active" onclick="presetDoctor(event)">🩺 医師向け</a><a href="#" onclick="presetNurse(event)">🏥 看護師向け</a></div>
    <a class="act" href="#" onclick="window.print()">🖨️ 印刷</a>
    <span class="meta">📅 {{ base_date }}</span>
  </div>
</div></header>

<div class="w">
  <nav class="tabs" id="kpiTabs"></nav>
  <div class="sum" id="summaryBar"></div>
  <div class="tb" id="toolbar"></div>

  <section class="main">
    <div class="pnl pnl-chart"><h3 id="chartTitle">📊 推移グラフ</h3><div class="chart" id="mainChart"></div></div>
    <div class="pnl pnl-rank">
      <h3 id="rankTitle">🏆 達成状況</h3>
      <div class="rk" id="rankList"></div>
      <div id="rankToggle" class="rank-toggle" style="display:none" onclick="toggleRankAll()">もっと見る &#9662;</div>
      <div class="legend"><span><span class="ld" style="background:#0e7a54"></span>▲ 達成</span><span><span class="ld" style="background:#b45309"></span>― 接近</span><span><span class="ld" style="background:#c4314b"></span>▼ 未達</span></div>
    </div>
  </section>

  <div class="drill" id="drillPanel">
    <div class="dr-head" id="drillHead" onclick="closeDrill()">📋 <span id="drillName"></span> の詳細 <span style="color:var(--mu)">✕</span></div>
    <div class="dr-body">
      <div class="dgrid" id="drillCards"></div>
      <div id="drillComment" style="margin:10px 0;padding:10px 14px;background:#f8fafc;border-radius:10px;font-size:13px;color:var(--sub)"></div>
      <div class="drill-graphs">
        <div><div style="font-size:11px;color:var(--sub);margin-bottom:4px" id="drillLabel1">🚪 新入院 推移</div><div class="drill-chart" id="drillChartAdm"></div></div>
        <div><div style="font-size:11px;color:var(--sub);margin-bottom:4px" id="drillLabel2">🛏️ 在院 推移</div><div class="drill-chart" id="drillChartInp"></div></div>
        <div><div style="font-size:11px;color:var(--sub);margin-bottom:4px" id="drillLabel3">💉 全麻 推移</div><div class="drill-chart" id="drillChartOp"></div></div>
      </div>
    </div>
  </div>

  <div class="ft">🏥 診療ダッシュボード 統合詳細 ｜ 生成 {{ generated_at }} ｜ 基準日 {{ base_date }}</div>
</div>

<script>
const DATA = {{ data_json|safe }};

let currentTab = 'admission';
let currentAxis = 'dept';
let currentPeriod = '12w';
let showWeekday = true;
let showHoliday = true;
let showMA7 = true;
let showMA28 = true;
let showDaily = true;
let currentDrill = null;  // ★課題4: 開いているドリルダウン名を保持
let admType = 'all';  // 新入院種別フィルタ: 'all' | 'planned' | 'emergency'

document.addEventListener('DOMContentLoaded', () => {
  const hash = location.hash.replace('#','');
  const params = new URLSearchParams(location.hash.includes('?') ? location.hash.split('?')[1] : '');
  if (['inpatient','admission','operation'].includes(hash.split('?')[0])) currentTab = hash.split('?')[0];
  if (params.get('axis')) currentAxis = params.get('axis');
  renderTabs(); renderAll();
});

// ★課題4: タブに大きい数字＋期間ラベルを明記
function renderTabs() {
  const bd = DATA.meta.base_date;
  const tabs = [
    {id:'inpatient', icon:'🛏️', name:'在院患者',
     big:`${DATA.kpi.inpatient.actual}人`, per:`${bd} 時点の在院数`,
     st:DATA.kpi.inpatient.status},
    {id:'admission', icon:'🚪', name:'新入院',
     big:`${DATA.kpi.admission.actual_7d}人`, per:`直近7日累計`,
     st:DATA.kpi.admission.status},
    {id:'operation', icon:'💉', name:'全身麻酔手術',
     big:`${DATA.kpi.operation.daily_avg}件/日`, per:`直近7平日平均`,
     st:DATA.kpi.operation.status},
  ];
  document.getElementById('kpiTabs').innerHTML = tabs.map(t =>
    `<div class="tab${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">
      <div class="nm">${t.icon} ${t.name} <span class="st">${t.st.shape} ${t.st.text}</span></div>
      <div class="big">${t.big}</div>
      <div class="per">${t.per}</div>
    </div>`
  ).join('');
}

function switchTab(id) {
  currentTab = id;
  if (id === 'operation') currentAxis = 'dept';
  admType = 'all';  // タブ切替でフィルタリセット
  renderTabs(); renderAll();
}
function setAxis(ax, btn) {
  currentAxis = ax;
  btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}
function setPeriod(p, btn) {
  currentPeriod = p;
  btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}
function presetDoctor(e) {
  e.preventDefault();
  document.querySelectorAll('.role a').forEach(a => a.classList.remove('active'));
  e.target.classList.add('active');
  currentTab='admission'; currentAxis='dept'; currentPeriod='12w';
  renderTabs(); renderAll();
}
function presetNurse(e) {
  e.preventDefault();
  document.querySelectorAll('.role a').forEach(a => a.classList.remove('active'));
  e.target.classList.add('active');
  currentTab='inpatient'; currentAxis='ward'; currentPeriod='12w';
  renderTabs(); renderAll();
}
function renderAll() { renderSummary(); renderToolbar(); renderContent(); closeDrill(); }

/* ★Plan-B: renderSummary — 実績+目標+差分を統合カードに集約 */
function renderSummary() {
  const kpi = DATA.kpi[currentTab];
  let main, refs;

  if (currentTab === 'inpatient') {
    const dayTypeLabel = kpi.is_weekday ? '平日目標' : '休日目標';
    const periodNote = `${DATA.meta.base_date} 時点（${dayTypeLabel} ${kpi.target}人）`;
    main = {
      icon:'🛏️', label:'在院患者数', periodNote:periodNote,
      actual:kpi.actual, unit:'人', targetLabel:dayTypeLabel,
      target:kpi.target, gap:kpi.gap, gapUnit:'人',
      rate:kpi.rate, status:kpi.status
    };
    refs = [
      {k:'今年度平均',  v:kpi.fy_avg!==null?`${kpi.fy_avg}人`:'—'},
      {k:'直近7日平均', v:kpi.avg_7d!==null?`${kpi.avg_7d}人`:'—', dr:kpi.rate<90},
      {k:'前年平均',    v:kpi.prev_avg!==null?`${kpi.prev_avg}人`:'—'},
    ];
  } else if (currentTab === 'admission') {
    main = {
      icon:'🚪', label:'新入院患者数', periodNote:'直近7日累計',
      actual:kpi.actual_7d, unit:'人', targetLabel:'週目標',
      target:kpi.target_weekly, gap:kpi.gap, gapUnit:'人',
      rate:kpi.rate_7d, status:kpi.status
    };
    refs = [
      {k:'年度平均',  v:kpi.fy_avg!==null?`${kpi.fy_avg}人`:'—'},
      {k:'年度達成率', v:kpi.fy_rate!==null?`${kpi.fy_rate}%`:'—', dr:kpi.fy_rate!=null&&kpi.fy_rate<90},
      {k:'前年平均',  v:kpi.prev_avg!==null?`${kpi.prev_avg}人`:'—'},
    ];
  } else {
    main = {
      icon:'💉', label:'全身麻酔手術', periodNote:'直近7平日平均',
      actual:kpi.daily_avg, unit:'件/日', targetLabel:'目標',
      target:kpi.target, gap:kpi.gap, gapUnit:'件/日',
      rate:kpi.rate, status:kpi.status
    };
    refs = [
      {k:'時間内稼働率', v:kpi.in_hours_rate!==null?`${kpi.in_hours_rate}%`:'—'},
      {k:'週間合計',     v:kpi.week_total!==null?`${kpi.week_total}件`:'—'},
      {k:'年度平均',     v:kpi.fy_avg!==null?`${kpi.fy_avg}件/日`:'—'},
    ];
  }

  // ステータス CSS クラス
  const sc = main.status ? main.status.css : 'mu';
  const ss = main.status ? main.status.shape : '—';
  const st = main.status ? main.status.text : '—';
  const barW = Math.min((main.rate||0)/1.5, 100);  // 150%→100%幅
  const gapPfx = main.gap > 0 ? '+' : '';

  const mainHtml = `<div class="bx-main">
    <h2>${main.icon} ${main.label}</h2>
    ${main.periodNote ? `<div class="period-note">${main.periodNote}</div>` : ''}
    <div class="main-val ${sc==='dr'?'dr':''}">${main.actual}<span class="main-unit">${main.unit}</span></div>
    <div class="tgt-row">
      <span class="tgt-icon">🎯</span>
      <span class="tgt-label">${main.targetLabel}</span>
      <span class="tgt-val">${main.target}${main.unit}</span>
      <span class="gap-val ${sc}">${gapPfx}${main.gap}${main.gapUnit}</span>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill ${sc}" style="width:${barW}%"></div></div>
      <div class="prog-meta">
        <span class="prog-pct ${sc}">${main.rate!=null?main.rate+'%':'—'}</span>
        <span class="prog-status ${sc}">${ss} ${st}</span>
      </div>
    </div>
  </div>`;

  const refsHtml = refs.map(r =>
    `<div class="bx"><div class="k">${r.k}</div><div class="v${r.dr?' dr':''}">${r.v}</div></div>`
  ).join('');

  document.getElementById('summaryBar').innerHTML = mainHtml + refsHtml;
}

function renderToolbar() {
  const isOp = currentTab === 'operation';
  const axes = isOp
    ? `<span class="btn active">🩺 診療科別</span>`
    : `<span class="btn${currentAxis==='dept'?' active':''}" onclick="setAxis('dept',this)">🩺 診療科別</span>
       <span class="btn${currentAxis==='ward'?' active':''}" onclick="setAxis('ward',this)">🏥 病棟別</span>`;
  // ★期間: 直近12週/24週/365日
  const periodDefs = [{l:'直近12週',p:'12w'},{l:'直近24週',p:'24w'},{l:'直近365日',p:'365d'}];
  const periods = periodDefs.map(d =>
    `<span class="btn${d.p===currentPeriod?' active':''}" onclick="setPeriod('${d.p}',this)">${d.l}</span>`
  ).join('');
  // ★平日/休日チェックボックス
  const mkChk = (id,lbl,checked,fn) => `<label style="font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;display:flex;align-items:center;gap:2px"><input type="checkbox" ${checked?'checked':''} onchange="${fn}"> ${lbl}</label>`;
  const dayChks = mkChk('wd','平日',showWeekday,"toggleDayType('weekday',this.checked)")
    + mkChk('hd','休日',showHoliday,"toggleDayType('holiday',this.checked)");
  // ★描画線チェックボックス
  const lineChks = mkChk('d','日次実績',showDaily,"toggleLine('daily',this.checked)")
    + mkChk('m7','7日MA',showMA7,"toggleLine('ma7',this.checked)")
    + mkChk('m28','28日MA',showMA28,"toggleLine('ma28',this.checked)");
  // ★新入院種別ラジオ（admission タブのみ表示）
  const mkRad = (val,lbl) => `<label style="font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;display:flex;align-items:center;gap:2px"><input type="radio" name="admType" value="${val}" ${admType===val?'checked':''} onchange="setAdmType('${val}')"> ${lbl}</label>`;
  const admTypeCtrl = currentTab==='admission'
    ? `<div class="grp"><span class="gl">入院種別</span>${mkRad('all','全体')}${mkRad('planned','予定')}${mkRad('emergency','緊急')}</div>`
    : '';
  document.getElementById('toolbar').innerHTML = `
    <div class="grp"><span class="gl">軸</span>${axes}</div>
    <div class="grp"><span class="gl">期間</span>${periods}</div>
    <div class="grp"><span class="gl">日種</span>${dayChks}</div>
    <div class="grp"><span class="gl">描画</span>${lineChks}</div>
    ${admTypeCtrl}
    <div class="grp"><span class="btn" onclick="window.print()">🖨️ 印刷</span></div>`;
}

function setAdmType(val) {
  admType = val;
  renderContent();
}

function toggleLine(type, checked) {
  if (type==='daily') showDaily=checked;
  else if (type==='ma7') showMA7=checked;
  else if (type==='ma28') showMA28=checked;
  renderContent();
}

function toggleDayType(type, checked) {
  if (type==='weekday') showWeekday = checked;
  else showHoliday = checked;
  // 最低1つはチェック
  if (!showWeekday && !showHoliday) { showWeekday = true; showHoliday = true; }
  renderContent();
}

function renderContent() {
  renderChart();
  renderRanking();
  // ★課題4: 期間切替時にドリルダウンも再描画
  if (currentDrill) openDrill(currentDrill);
}

function periodCutoff() {
  const bd = DATA.meta.base_date;
  if (currentPeriod === '12w') return new Date(new Date(bd) - 12*7*86400000).toISOString().slice(0,10);
  if (currentPeriod === '24w') return new Date(new Date(bd) - 24*7*86400000).toISOString().slice(0,10);
  return new Date(new Date(bd) - 365*86400000).toISOString().slice(0,10); // 365d
}

// ★クライアント側で7日移動平均を計算（フィルタ済みデータ用）
function calcMA(values, w) {
  const ma = [];
  for (let i = 0; i < values.length; i++) {
    let sum = 0, cnt = 0;
    for (let j = Math.max(0, i-w+1); j <= i; j++) {
      if (values[j] !== null) { sum += values[j]; cnt++; }
    }
    ma.push(cnt > 0 ? Math.round(sum/cnt*10)/10 : null);
  }
  return ma;
}
function calcMA7(v) { return calcMA(v, 7); }
function calcMA28(v) { return calcMA(v, 28); }
// ★暦日ベースの7日ローリング合計（手術データは歯抜けなのでインデックスではなく日付でウィンドウを取る）
function calcRollingSumByDate(dates, values, windowDays) {
  const rs = [];
  for (let i = 0; i < dates.length; i++) {
    const endMs = new Date(dates[i]).getTime();
    const startMs = endMs - (windowDays - 1) * 86400000;
    let sum = 0;
    for (let j = 0; j <= i; j++) {
      const dMs = new Date(dates[j]).getTime();
      if (dMs >= startMs && dMs <= endMs) {
        if (values[j] !== null) sum += values[j];
      }
    }
    rs.push(sum);
  }
  return rs;
}
// ★暦日ベースの28日合計÷4（過去4週平均）
function calcRollingAvg4wByDate(dates, values) {
  const rs = [];
  for (let i = 0; i < dates.length; i++) {
    const endMs = new Date(dates[i]).getTime();
    const startMs = endMs - 27 * 86400000;
    let sum = 0;
    for (let j = 0; j <= i; j++) {
      const dMs = new Date(dates[j]).getTime();
      if (dMs >= startMs && dMs <= endMs) {
        if (values[j] !== null) sum += values[j];
      }
    }
    rs.push(Math.round(sum / 4 * 10) / 10);
  }
  return rs;
}

// ★平日/休日フィルタ適用
function filterByDayType(dates, values, isWeekday) {
  const fd = [], fv = [];
  for (let i = 0; i < dates.length; i++) {
    const wd = isWeekday[i];
    if ((wd && showWeekday) || (!wd && showHoliday)) {
      fd.push(dates[i]); fv.push(values[i]);
    }
  }
  return {dates: fd, values: fv};
}

function renderChart() {
  const trend = DATA.trend[currentTab];
  if (!trend || !trend.dates.length) return;
  const cutoff = periodCutoff();

  // ★新入院種別フィルタ: admType に応じた値配列を選択
  const rawVals = (currentTab === 'admission' && admType !== 'all' && trend[admType])
    ? trend[admType] : trend.values || [];

  // ★修正: 全データで平日/休日フィルタ→MA計算→その後に期間切り取り
  const fAll = filterByDayType(trend.dates, rawVals, trend.is_weekday||[]);
  const fAllMA7 = calcMA7(fAll.values);
  const fAllMA28 = calcMA28(fAll.values);

  // 期間で切り取り
  const si = Math.max(0, fAll.dates.findIndex(d => d >= cutoff));
  const fDates = fAll.dates.slice(si);
  const fVals = fAll.values.slice(si);
  const fMA7 = fAllMA7.slice(si);

  // 種別フィルタ中は目標ラインを非表示
  const showTarget = !(currentTab === 'admission' && admType !== 'all');
  let tgt = currentTab==='inpatient'?DATA.kpi.inpatient.target:currentTab==='admission'?Math.round(DATA.kpi.admission.target_weekly/7):DATA.kpi.operation.target;
  const traces = [];

  const fMA28 = fAllMA28.slice(si);

  // ★日次実績（細い点線）
  if (showDaily) {
    traces.push({name:'日次実績', x:fDates, y:fVals, type:'scatter', mode:'lines',
      line:{color:'#94A3B8',width:1,dash:'dot'}, opacity:0.7});
  }
  // ★ 7日移動平均（緑太線）
  if (showMA7) {
    traces.push({name:'7日移動平均', x:fDates, y:fMA7, type:'scatter', mode:'lines',
      line:{color:'#0D9488',width:2.5}});
  }
  // ★ 28日移動平均（オレンジ実線）
  if (showMA28) {
    traces.push({name:'28日移動平均', x:fDates, y:fMA28, type:'scatter', mode:'lines',
      line:{color:'#e67e22',width:2}});
  }
  // ★目標ライン（種別フィルタ中は非表示）
  if (fDates.length && showTarget) {
    traces.push({name:`目標 ${tgt}`, x:[fDates[0],fDates[fDates.length-1]], y:[tgt,tgt],
      type:'scatter', mode:'lines', line:{color:'#C0293B',width:2,dash:'dot'}});
  }
  // ★ゾーン凡例用ダミートレース
  if (showTarget) {
    traces.push({name:'達成ゾーン', x:[null], y:[null], type:'scatter', mode:'lines',
      line:{width:8,color:'rgba(22,163,74,0.3)'}, showlegend:true});
    traces.push({name:'注意ゾーン', x:[null], y:[null], type:'scatter', mode:'lines',
      line:{width:8,color:'rgba(245,158,11,0.35)'}, showlegend:true});
  }

  // ★Y軸範囲
  const allY = [...(showDaily?fVals:[]),...(showMA7?fMA7:[]),...(showMA28?fMA28:[]),...(showTarget?[tgt]:[])].filter(v=>v!=null);
  const yMin=Math.min(...allY), yMax=Math.max(...allY), yPad=(yMax-yMin)*.08||5;
  const yLo = Math.max(0,Math.floor(yMin-yPad)), yHi = Math.ceil(yMax+yPad);

  // ★ゾーン色分け（種別フィルタ中はゾーン非表示）
  const shapes = [];
  if (showTarget) {
    shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt,y1:yHi,
      fillcolor:'rgba(22,163,74,0.08)',line:{width:0}});
    shapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt*0.95,y1:tgt,
      fillcolor:'rgba(245,158,11,0.10)',line:{width:0}});
  }

  const pLabels = {'12w':'直近12週','24w':'直近24週','365d':'直近365日'};
  const dayLabel = (showWeekday&&showHoliday)?'':showWeekday?' 平日のみ':' 休日のみ';
  const layout = {
    font:{family:'Noto Sans JP,sans-serif',size:11,color:'#5A6A82'},
    xaxis:{gridcolor:'#DCE1E9',tickformat:'%m/%d',tickangle:-45},
    yaxis:{range:[yLo,yHi],gridcolor:'#DCE1E9',title:{text:'',font:{size:10}}},
    legend:{orientation:'h',x:0,y:-0.22,font:{size:10}},
    hovermode:'x unified',
    margin:{l:50,r:20,t:10,b:55},height:380,
    plot_bgcolor:'#fff',paper_bgcolor:'#fff',
    shapes: shapes,
  };
  Plotly.newPlot('mainChart',traces,layout,{responsive:true});
  const titles = {inpatient:'在院患者数',admission:'新入院患者数',operation:'全身麻酔手術'};
  const admLabel = currentTab==='admission' && admType!=='all' ? (admType==='planned'?' ／ 予定入院':' ／ 緊急入院') : '';
  document.getElementById('chartTitle').textContent = `📊 ${titles[currentTab]||''}${admLabel} 推移（${pLabels[currentPeriod]}${dayLabel}）`;
}

// ★課題1: 折りたたみバグ修正（クラス付け外しで制御）
const RANK_SHOW = 10;
let rankExpanded = false;

function renderRanking() {
  const key = `${currentAxis}_${currentPeriod === '12w' ? '7' : currentPeriod === '24w' ? '28' : 'fy'}`;
  const items = (DATA.perf[currentTab]||{})[key] || [];
  document.getElementById('rankTitle').textContent = `🏆 ${currentAxis==='dept'?'診療科別':'病棟別'} 達成状況`;
  rankExpanded = false;

  document.getElementById('rankList').innerHTML = items.map((r,i) => {
    const bw = Math.min((r.rate||0),200)/2;
    return `<div class="ri${i>=RANK_SHOW?' rank-extra':''}" onclick="openDrill('${r.name}')">
      <div class="num ${r.status}">${r.rank}</div>
      <div><div class="nm">${r.name}</div><div class="mt2">${r.actual}/${r.target||'—'}</div></div>
      <div class="bar"><div class="fill ${r.status}" style="width:${bw}%"></div></div>
      <div class="rt ${r.status}">${r.shape} ${r.rate!==null?r.rate+'%':'—'}</div>
      <div class="stl ${r.status}">${r.text}</div>
      <div class="arrow">›</div></div>`;
  }).join('');

  // 初期非表示
  document.querySelectorAll('.rank-extra').forEach(el => el.style.display = 'none');
  const tog = document.getElementById('rankToggle');
  const extra = items.length - RANK_SHOW;
  if (extra > 0) { tog.style.display='block'; tog.textContent=`もっと見る（+${extra}件）▾`; tog.classList.remove('expanded'); }
  else { tog.style.display='none'; }
}

function toggleRankAll() {
  rankExpanded = !rankExpanded;
  const tog = document.getElementById('rankToggle');
  document.querySelectorAll('.rank-extra').forEach(el => {
    el.style.display = rankExpanded ? 'grid' : 'none';  // ★修正: 'grid' を明示
  });
  if (rankExpanded) { tog.textContent='閉じる ▴'; tog.classList.add('expanded'); }
  else { const n=document.querySelectorAll('.rank-extra').length; tog.textContent=`もっと見る（+${n}件）▾`; tog.classList.remove('expanded'); }
}

// ════ DRILL DOWN ════
function openDrill(name) {
  const d = DATA.drill[name];
  if (!d) { console.warn('drill data not found:', name); return; }
  document.getElementById('drillName').textContent = name;

  const opLabel = d.operation.label || '全麻';
  const showOp = d.ward_extra || d.operation.actual !== null;
  const cards = [
    {l:'🚪 新入院',p:'直近7日累計',v:d.admission.actual_7d,s:`目標 ${d.admission.target||'—'}`,rate:d.admission.rate,dr:d.admission.rate!=null&&d.admission.rate<90},
    {l:'🛏️ 在院',p:`${DATA.meta.base_date} 時点`,v:d.inpatient.actual,s:`目標 ${d.inpatient.target||'—'}`,rate:d.inpatient.rate,dr:d.inpatient.rate!=null&&d.inpatient.rate<90},
  ];
  if (showOp) cards.push(
    {l:`💉 ${opLabel}`,p:d.ward_extra?'':d.operation.label?'':'直近7日累計',v:d.operation.actual,s:d.operation.target?`目標 ${d.operation.target}`:'—',rate:d.operation.rate,dr:d.operation.rate!=null&&d.operation.rate<90}
  );
  if (d.ward_extra) {
    const we=d.ward_extra;
    cards.push({l:'🏥 利用率',v:we.util_rate!=null?we.util_rate+'%':'—',s:`病床数 ${we.beds||'—'}`,rate:null,dr:we.util_rate!=null&&we.util_rate<85});
  }
  document.getElementById('drillCards').innerHTML = cards.map(c =>
    `<div class="mc"><div class="l">${c.l}${c.p?`<span style="font-size:9px;font-weight:600;color:var(--mu);margin-left:4px">${c.p}</span>`:''}</div><div class="v${c.dr?' dr':''}">${c.v}</div><div class="s">${c.s}${c.rate!=null?' ('+c.rate+'%)':''}</div></div>`
  ).join('');

  const comment = d.comment||'';
  const cel = document.getElementById('drillComment');
  cel.innerHTML = comment ? `📋 ${comment}` : '';
  cel.style.display = comment ? 'block' : 'none';

  // ★課題5: ミニグラフ高さ225px、Y軸padding±5%で変化を強調
  // ★課題6: メイン期間ボタンに同期してミニグラフも期間フィルタ
  const miniCutoff = periodCutoff();

  function renderMini(elId, td, targetVal) {
    if (!td||!td.dates||!td.dates.length) {
      document.getElementById(elId).innerHTML='<div style="color:#9daab8;font-size:11px;text-align:center;padding:60px 0">データなし</div>';
      return;
    }
    // ★修正: 全データでフィルタ→MA計算→期間切り取り
    const ffAll = (td.is_weekday && td.is_weekday.length > 0)
      ? filterByDayType(td.dates, td.values||[], td.is_weekday)
      : {dates: td.dates, values: td.values||[]};
    const allMA7 = calcMA7(ffAll.values);
    const allMA28 = calcMA28(ffAll.values);
    // 期間で切り取り
    const si = Math.max(0, ffAll.dates.findIndex(x => x >= miniCutoff));
    const ds = ffAll.dates.slice(si);
    const vs = ffAll.values.slice(si);
    const m7 = allMA7.slice(si);
    const m28 = allMA28.slice(si);
    const tr=[], yV=[];
    // 日次実績（メインと同じグレー細点線）
    if (showDaily) { tr.push({name:'実績',x:ds,y:vs,type:'scatter',mode:'lines',line:{color:'#94A3B8',width:1,dash:'dot'},opacity:0.7,showlegend:false}); yV.push(...vs.filter(v=>v!=null)); }
    // 7日MA（緑）
    if (showMA7 && m7.length) { tr.push({name:'7日MA',x:ds,y:m7,type:'scatter',mode:'lines',line:{color:'#0D9488',width:2}}); yV.push(...m7.filter(v=>v!=null)); }
    // 28日MA（オレンジ）
    if (showMA28 && m28.length) { tr.push({name:'28日MA',x:ds,y:m28,type:'scatter',mode:'lines',line:{color:'#e67e22',width:1.5}}); yV.push(...m28.filter(v=>v!=null)); }
    if (targetVal) { tr.push({name:'目標',x:[ds[0],ds[ds.length-1]],y:[targetVal,targetVal],type:'scatter',mode:'lines',line:{color:'#C0293B',width:1.5,dash:'dot'}}); yV.push(targetVal); }
    const mn=yV.length?Math.min(...yV):0, mx=yV.length?Math.max(...yV):10;
    const pd=(mx-mn)*.05||1;
    // ゾーン
    const mShapes = [{type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:targetVal||0,y1:Math.ceil(mx+pd),fillcolor:'rgba(22,163,74,0.06)',line:{width:0}}];
    if (targetVal) mShapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:(targetVal*0.95),y1:targetVal,fillcolor:'rgba(245,158,11,0.08)',line:{width:0}});
    Plotly.newPlot(elId,tr,{font:{family:'Noto Sans JP,sans-serif',size:10,color:'#5A6A82'},xaxis:{gridcolor:'#DCE1E9',tickfont:{size:8},tickformat:'%m/%d'},yaxis:{range:[Math.max(0,Math.floor(mn-pd)),Math.ceil(mx+pd)],gridcolor:'#DCE1E9',tickfont:{size:9}},legend:{orientation:'h',x:0,y:-0.25,font:{size:9}},margin:{l:35,r:8,t:5,b:30},height:225,plot_bgcolor:'#fff',paper_bgcolor:'#fff',hovermode:'x unified',shapes:mShapes},{responsive:true,displayModeBar:false});
  }

  // ★手術専用ミニグラフ: 7日ローリング合計で表示
  function renderMiniSurgery(elId, td, weeklyTarget) {
    if (!td||!td.dates||!td.dates.length) {
      document.getElementById(elId).innerHTML='<div style="color:#9daab8;font-size:11px;text-align:center;padding:60px 0">データなし</div>';
      return;
    }
    // ★修正: 全データでフィルタ→ローリング合計計算→期間切り取り
    const ffAll = (td.is_weekday && td.is_weekday.length > 0)
      ? filterByDayType(td.dates, td.values||[], td.is_weekday)
      : {dates: td.dates, values: td.values||[]};
    // ★暦日ベースで7日ローリング合計を計算（歯抜けデータ対応）
    const allRS7 = calcRollingSumByDate(ffAll.dates, ffAll.values, 7);
    // ★暦日ベースで28日合計÷4（4週平均）
    const allRS28avg = calcRollingAvg4wByDate(ffAll.dates, ffAll.values);
    // rs7の4点MA（ノイズ除去用）
    const allRS7ma = calcMA(allRS7, 4);
    // 期間で切り取り
    const si = Math.max(0, ffAll.dates.findIndex(x => x >= miniCutoff));
    const ds = ffAll.dates.slice(si);
    const vs = ffAll.values.slice(si);
    const rs7 = allRS7.slice(si);
    const rs7ma = allRS7ma.slice(si);
    const rs28avg = allRS28avg.slice(si);

    const tgt = weeklyTarget;
    const tr=[], yV=[];
    // 週間実績（グレー細点線）
    if (showDaily) {
      tr.push({name:'週間実績',x:ds,y:rs7,type:'scatter',mode:'lines',
        line:{color:'#94A3B8',width:1,dash:'dot'},opacity:0.7});
      yV.push(...rs7.filter(v=>v!=null));
    }
    // 4週移動平均（緑線）― 全データで事前計算済み
    if (showMA7 && rs7ma.length) {
      tr.push({name:'4週移動平均',x:ds,y:rs7ma,type:'scatter',mode:'lines',
        line:{color:'#0D9488',width:2}});
      yV.push(...rs7ma.filter(v=>v!=null));
    }
    // 28日平均（オレンジ）
    if (showMA28 && rs28avg.length) {
      tr.push({name:'4週平均',x:ds,y:rs28avg,type:'scatter',mode:'lines',
        line:{color:'#e67e22',width:1.5}});
      yV.push(...rs28avg.filter(v=>v!=null));
    }
    if (tgt) {
      tr.push({name:`週目標 ${tgt}`,x:[ds[0],ds[ds.length-1]],y:[tgt,tgt],
        type:'scatter',mode:'lines',line:{color:'#C0293B',width:1.5,dash:'dot'}});
      yV.push(tgt);
    }
    const mn=yV.length?Math.min(...yV):0, mx=yV.length?Math.max(...yV):10;
    const pd=(mx-mn)*.05||1;
    const mShapes = [{type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:tgt||0,y1:Math.ceil(mx+pd),fillcolor:'rgba(22,163,74,0.06)',line:{width:0}}];
    if (tgt) mShapes.push({type:'rect',xref:'paper',yref:'y',x0:0,x1:1,y0:(tgt*0.95),y1:tgt,fillcolor:'rgba(245,158,11,0.08)',line:{width:0}});
    Plotly.newPlot(elId,tr,{font:{family:'Noto Sans JP,sans-serif',size:10,color:'#5A6A82'},xaxis:{gridcolor:'#DCE1E9',tickfont:{size:8},tickformat:'%m/%d'},yaxis:{range:[Math.max(0,Math.floor(mn-pd)),Math.ceil(mx+pd)],gridcolor:'#DCE1E9',tickfont:{size:9}},legend:{orientation:'h',x:0,y:-0.25,font:{size:9}},margin:{l:35,r:8,t:5,b:30},height:225,plot_bgcolor:'#fff',paper_bgcolor:'#fff',hovermode:'x unified',shapes:mShapes},{responsive:true,displayModeBar:false});
  }

  const isWard = !!d.ward_extra;
  const isSurgeryDept = !isWard && d.operation.actual !== null;
  const ann = s => `<span style="font-size:9px;font-weight:600;color:var(--mu);margin-left:5px">${s}</span>`;
  document.getElementById('drillLabel1').innerHTML='🚪 新入院 推移'+ann('日次実績');
  document.getElementById('drillLabel2').innerHTML='🛏️ 在院 推移'+ann('日次実績');
  document.getElementById('drillLabel3').innerHTML=isWard?'— (病棟は手術データなし)':isSurgeryDept?'💉 全麻 推移'+ann('7日ローリング合計'):'— (全麻 非対象)';

  // 新入院種別フィルタをミニグラフにも適用
  const rawAdmTd = d.trend ? d.trend.admission : null;
  const filtAdmTd = (admType !== 'all' && rawAdmTd && rawAdmTd[admType])
    ? {...rawAdmTd, values: rawAdmTd[admType]} : rawAdmTd;
  renderMini('drillChartAdm', filtAdmTd, (admType==='all' && d.admission.target) ? d.admission.target/7 : null);
  renderMini('drillChartInp', d.trend?d.trend.inpatient:null, d.inpatient.target);
  if (isSurgeryDept) {
    // ★手術は「直近7日ローリング合計」で表示し、目標は週目標そのまま
    renderMiniSurgery('drillChartOp', d.trend?d.trend.operation:null, d.operation.target);
  } else {
    document.getElementById('drillChartOp').innerHTML='<div style="color:#9daab8;font-size:11px;text-align:center;padding:60px 0">' + (isWard?'病棟単位の手術データなし':'全麻手術 非対象診療科') + '</div>';
  }

  currentDrill = name;  // ★保持
  document.getElementById('drillPanel').classList.add('open');
  document.getElementById('drillPanel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDrill() {
  currentDrill = null;  // ★クリア
  document.getElementById('drillPanel').classList.remove('open');
  ['drillChartAdm','drillChartInp','drillChartOp'].forEach(id => { try{Plotly.purge(id)}catch(e){} });
}
